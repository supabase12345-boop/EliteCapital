<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الدردشة - WE TOP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #1e293b;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #c8a97e;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 70px;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            background: rgba(200,169,126,0.1);
            border: 2px solid #c8a97e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8a97e;
            font-size: 20px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .back-btn:active {
            background: #c8a97e;
            color: #0f172a;
        }

        .header-info {
            flex: 1;
        }

        .header-info h1 {
            font-size: 18px;
            color: #c8a97e;
            margin-bottom: 4px;
        }

        .header-info p {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .chat-area {
            position: fixed;
            top: 70px;
            bottom: 80px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(135deg, #0f172a, #1a1f2e);
        }

        .message-user {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }

        .message-user-content {
            background: #c8a97e;
            color: #0f172a;
            padding: 12px 16px;
            border-radius: 18px 18px 5px 18px;
            max-width: 80%;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-support {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 8px;
        }

        .message-support-content {
            background: #1e293b;
            border: 1px solid rgba(200,169,126,0.3);
            padding: 12px 16px;
            border-radius: 18px 18px 18px 5px;
            max-width: 80%;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .chat-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            border: 2px solid #c8a97e;
        }

        .image-loading {
            padding: 10px;
            background: rgba(200,169,126,0.1);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #c8a97e;
        }

        .message-info {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
            padding: 0 4px;
        }

        .message-user .message-info {
            justify-content: flex-end;
        }

        .date-divider {
            text-align: center;
            margin: 16px 0;
        }

        .date-divider span {
            background: rgba(255,255,255,0.05);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .input-area {
            background: #1e293b;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #c8a97e;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            z-index: 100;
        }

        .input-area input {
            flex: 1;
            height: 56px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(200,169,126,0.3);
            border-radius: 30px;
            padding: 0 20px;
            color: white;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
        }

        .input-area input:focus {
            outline: none;
            border-color: #c8a97e;
        }

        .input-area input:disabled {
            opacity: 0.5;
        }

        .send-btn {
            width: 56px;
            height: 56px;
            background: #c8a97e;
            border: none;
            border-radius: 50%;
            color: #0f172a;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .start-page {
            position: fixed;
            top: 70px;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #0f172a, #1a1f2e);
        }

        .start-icon {
            font-size: 80px;
            color: #c8a97e;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .start-page h2 {
            font-size: 28px;
            color: #c8a97e;
            margin-bottom: 10px;
        }

        .start-page p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            font-size: 16px;
        }

        .start-btn {
            background: #c8a97e;
            color: #0f172a;
            border: none;
            border-radius: 50px;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 20px;
            border: 3px solid #c8a97e;
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #e74c3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 80px;
            left: 16px;
            right: 16px;
            background: #27ae60;
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            text-align: center;
            font-size: 14px;
            display: none;
            z-index: 9999;
        }

        .toast.error {
            background: #e74c3c;
        }

        @media (max-width: 380px) {
            .message-user-content, .message-support-content { max-width: 90%; font-size: 14px; padding: 10px 14px; }
            .input-area input { height: 48px; font-size: 14px; }
            .send-btn { width: 48px; height: 48px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <img id="modalImage" src="" alt="">
        <div class="image-modal-close" onclick="closeImageModal()">&times;</div>
    </div>

    <div class="header">
        <a href="dashboard.html" class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-right"></i>
        </a>
        <div class="header-info">
            <h1>الدردشة</h1>
            <p>تواصل مع الدعم</p>
        </div>
    </div>

    <div id="chatContainer" style="display: none;">
        <div class="chat-area" id="messagesContainer"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." disabled>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="startContainer" class="start-page">
        <div class="start-icon">
            <i class="fas fa-comments"></i>
        </div>
        <h2>مرحباً بك</h2>
        <p>يمكنك التواصل مع فريق الدعم</p>
        <button class="start-btn" onclick="startChat()">
            <i class="fas fa-play"></i>
            بدء المحادثة
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;
        let currentChat = null;
        let messageInterval = null;
        let isAdmin = false;
        let hasSentAutoReply = false; // منع تكرار إرسال الرد

        // رسالة الرد التلقائي (مرة واحدة فقط)
        const AUTO_REPLY = "📨 تم استلام رسالتك!\n\n"
            + "للتواصل المباشر مع خدمة العملاء:\n"
            + "👉 تواصل عبر تيليجرام: @mr_tony5\n"
            + "🔗 https://t.me/mr_tony5\n\n"
            + "شكراً لتواصلك مع WE TOP 💎";

        async function checkUser() {
            const savedUser = localStorage.getItem('current_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
            
            if (window.supabaseHelpers) {
                const result = await window.supabaseHelpers.getUserById(currentUser.id);
                if (result.success && result.data) {
                    currentUser = result.data;
                    isAdmin = currentUser.is_admin || false;
                }
            }
        }

        async function checkExistingChat() {
            try {
                const result = await window.supabaseHelpers.getUserActiveChat(currentUser.id);
                if (result.success && result.data) {
                    currentChat = result.data;
                    showChatInterface();
                    await loadMessages();
                    messageInterval = setInterval(loadMessages, 3000);
                } else {
                    showStartInterface();
                }
            } catch (error) {
                showStartInterface();
            }
        }

        function showChatInterface() {
            document.getElementById('startContainer').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'block';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            setTimeout(() => document.getElementById('messageInput').focus(), 500);
        }

        function showStartInterface() {
            document.getElementById('startContainer').style.display = 'flex';
            document.getElementById('chatContainer').style.display = 'none';
        }

        async function startChat() {
            try {
                showToast('جاري بدء المحادثة...', 'info');
                const result = await window.supabaseHelpers.startLiveChat(currentUser.id);
                if (result.success) {
                    currentChat = result.data;
                    showChatInterface();
                    await loadMessages();
                    messageInterval = setInterval(loadMessages, 3000);
                    showToast('✅ تم بدء المحادثة');
                    hasSentAutoReply = false; // إعادة تعيين عند بدء محادثة جديدة
                } else {
                    showToast('❌ ' + result.error, 'error');
                }
            } catch (error) {
                showToast('❌ حدث خطأ', 'error');
            }
        }

        async function loadMessages() {
            if (!currentChat) return;
            try {
                const result = await window.supabaseHelpers.getChatMessages(currentChat.id);
                if (result.success && result.data) {
                    displayMessages(result.data);
                    
                    // التحقق من رسائل جديدة من المستخدم (وليس من النظام)
                    const now = Date.now();
                    for (const msg of result.data) {
                        // إذا كانت الرسالة من المستخدم ولم يسبق إرسال الرد له
                        if (msg.user_id === currentUser.id && 
                            !msg.is_deleted && 
                            !hasSentAutoReply &&
                            msg.message) {
                            
                            hasSentAutoReply = true;
                            
                            // إرسال الرد التلقائي (مرة واحدة فقط)
                            setTimeout(async () => {
                                await window.supabaseHelpers.sendChatMessage(
                                    currentChat.id,
                                    currentUser.id,
                                    AUTO_REPLY
                                );
                                await loadMessages();
                                console.log('✅ تم إرسال الرد التلقائي (مرة واحدة)');
                            }, 1000);
                            
                            break; // نخرج من الحلقة بعد إرسال الرد الأول
                        }
                    }
                    
                    await window.supabaseHelpers.markMessagesAsRead(currentChat.id, currentUser.id);
                }
            } catch (error) {
                console.error('خطأ:', error);
            }
        }

        function formatMessageWithLinks(text) {
            if (!text) return '';
            // تحويل الروابط إلى روابط قابلة للنقر
            let formatted = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#c8a97e;text-decoration:underline;">$1</a>');
            formatted = formatted.replace(/@(\w+)/g, '<a href="https://t.me/$1" target="_blank" style="color:#c8a97e;text-decoration:underline;">@$1</a>');
            return formatted;
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            let html = '';
            let lastDate = null;
            
            messages.forEach(msg => {
                if (msg.is_deleted && !isAdmin) return;
                
                const isUser = msg.user_id === currentUser.id;
                const msgDate = new Date(msg.created_at);
                const dateStr = msgDate.toLocaleDateString('ar-SA');
                const timeStr = msgDate.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
                
                if (lastDate !== dateStr) {
                    html += `<div class="date-divider"><span>${dateStr}</span></div>`;
                    lastDate = dateStr;
                }
                
                let messageContent = '';
                if (msg.is_deleted) {
                    messageContent = `<div class="message-deleted">🗑️ تم حذف الرسالة</div>`;
                } else {
                    if (msg.image_url) {
                        messageContent += `<img src="${msg.image_url}" class="chat-image" onclick="showFullImage(this)">`;
                    }
                    if (msg.message) {
                        messageContent += `<div>${formatMessageWithLinks(msg.message)}</div>`;
                    }
                }
                
                if (isUser) {
                    html += `<div class="message-user"><div class="message-user-content">${messageContent}<div class="message-info"><span>أنت</span><span>•</span><span>${timeStr}</span></div></div></div>`;
                } else {
                    const senderName = msg.users?.is_admin ? 'الدعم' : 'WE TOP';
                    html += `<div class="message-support"><div class="message-support-content">${messageContent}<div class="message-info"><span>${senderName}</span><span>•</span><span>${timeStr}</span></div></div></div>`;
                }
            });
            
            if (messages.length === 0) html = '<div class="no-messages" style="text-align:center;color:rgba(255,255,255,0.3);padding:40px;">لا توجد رسائل بعد</div>';
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentChat) return;
            
            input.value = '';
            await window.supabaseHelpers.sendChatMessage(currentChat.id, currentUser.id, message);
            await loadMessages();
        }

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function showFullImage(imgElement) {
            document.getElementById('modalImage').src = imgElement.src;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        function goBack() {
            if (messageInterval) clearInterval(messageInterval);
            window.location.href = 'dashboard.html';
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (type === 'error' ? 'error' : '');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await checkUser();
            await checkExistingChat();
        });

        window.addEventListener('beforeunload', () => {
            if (messageInterval) clearInterval(messageInterval);
        });
    </script>
</body>
</html>
