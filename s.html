<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الدردشة المباشرة - Elite Capital</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#c8a97e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Elite Capital">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #1e293b;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #c8a97e;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 70px;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            background: rgba(200,169,126,0.1);
            border: 2px solid #c8a97e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8a97e;
            font-size: 20px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .back-btn:active {
            background: #c8a97e;
            color: #0f172a;
        }

        .header-info {
            flex: 1;
        }

        .header-info h1 {
            font-size: 18px;
            color: #c8a97e;
            margin-bottom: 4px;
        }

        .header-info p {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(39,174,96,0.1);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #27ae60;
            font-size: 13px;
            color: #27ae60;
            flex-shrink: 0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #27ae60;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* مؤشر الكتابة التلقائية */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(200,169,126,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            margin: 5px 0;
            width: fit-content;
            font-size: 12px;
            color: #c8a97e;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #c8a97e;
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        /* زر التيليجرام في الرسالة */
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #0088cc;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .telegram-btn i {
            font-size: 20px;
        }

        .telegram-btn:hover {
            background: #006699;
            transform: scale(1.02);
        }

        /* منطقة المحادثة */
        .chat-area {
            position: fixed;
            top: 70px;
            bottom: 80px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(135deg, #0f172a, #1a1f2e);
        }

        .message-user {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }

        .message-user-content {
            background: #c8a97e;
            color: #0f172a;
            padding: 12px 16px;
            border-radius: 18px 18px 5px 18px;
            max-width: 80%;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-support {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 8px;
        }

        .message-support-content {
            background: #1e293b;
            border: 1px solid rgba(200,169,126,0.3);
            padding: 12px 16px;
            border-radius: 18px 18px 18px 5px;
            max-width: 80%;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-auto {
            background: rgba(200,169,126,0.15);
            border-right: 3px solid #c8a97e;
        }

        .message-deleted {
            background: rgba(231,76,60,0.1);
            border: 1px dashed #e74c3c;
            color: rgba(255,255,255,0.5);
            font-style: italic;
            padding: 12px 16px;
            border-radius: 18px;
            text-align: center;
        }

        .chat-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            border: 2px solid #c8a97e;
        }

        .image-loading {
            padding: 10px;
            background: rgba(200,169,126,0.1);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #c8a97e;
        }

        .message-info {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
            padding: 0 4px;
        }

        .message-user .message-info {
            justify-content: flex-end;
        }

        .date-divider {
            text-align: center;
            margin: 16px 0;
        }

        .date-divider span {
            background: rgba(255,255,255,0.05);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(200,169,126,0.2);
        }

        .input-area {
            background: #1e293b;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #c8a97e;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            z-index: 100;
        }

        .input-area input {
            flex: 1;
            height: 56px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(200,169,126,0.3);
            border-radius: 30px;
            padding: 0 20px;
            color: white;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
        }

        .input-area input:focus {
            outline: none;
            border-color: #c8a97e;
            background: rgba(200,169,126,0.1);
        }

        .input-area input:disabled {
            opacity: 0.5;
        }

        .image-upload-btn {
            width: 56px;
            height: 56px;
            background: rgba(200,169,126,0.2);
            border: 2px solid #c8a97e;
            border-radius: 50%;
            color: #c8a97e;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .send-btn {
            width: 56px;
            height: 56px;
            background: #c8a97e;
            border: none;
            border-radius: 50%;
            color: #0f172a;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(200,169,126,0.3);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .image-preview {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            border: 2px solid #c8a97e;
            border-radius: 20px;
            padding: 15px;
            display: none;
            z-index: 200;
            max-width: 90%;
        }

        .image-preview img {
            max-height: 150px;
            border-radius: 10px;
        }

        .image-preview-close {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 30px;
            height: 30px;
            background: #e74c3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid white;
        }

        .upload-progress {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            border: 2px solid #c8a97e;
            border-radius: 30px;
            padding: 10px 20px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        .upload-progress.active {
            display: flex;
        }

        .upload-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(200,169,126,0.3);
            border-top-color: #c8a97e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .start-page {
            position: fixed;
            top: 70px;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #0f172a, #1a1f2e);
        }

        .start-icon {
            font-size: 80px;
            color: #c8a97e;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .start-page h2 {
            font-size: 28px;
            color: #c8a97e;
            margin-bottom: 10px;
        }

        .start-page p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            line-height: 1.8;
            font-size: 16px;
        }

        .start-btn {
            background: #c8a97e;
            color: #0f172a;
            border: none;
            border-radius: 50px;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            width: 90%;
            max-width: 300px;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(200,169,126,0.3);
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 20px;
            border: 3px solid #c8a97e;
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #e74c3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid white;
        }

        .toast {
            position: fixed;
            top: 80px;
            left: 16px;
            right: 16px;
            background: #27ae60;
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            text-align: center;
            font-size: 14px;
            display: none;
            z-index: 9999;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .toast.error {
            background: #e74c3c;
        }

        .toast.warning {
            background: #f39c12;
        }

        .no-messages {
            text-align: center;
            color: rgba(255,255,255,0.3);
            padding: 40px 20px;
            font-size: 14px;
        }

        @media (max-width: 380px) {
            .status span:not(.status-dot) { display: none; }
            .message-user-content, .message-support-content { max-width: 90%; font-size: 14px; padding: 10px 14px; }
            .chat-image { max-width: 150px; }
            .input-area input { height: 48px; font-size: 14px; }
            .send-btn, .image-upload-btn { width: 48px; height: 48px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <img id="modalImage" src="" alt="">
        <div class="image-modal-close" onclick="closeImageModal()">&times;</div>
    </div>

    <div class="header">
        <a href="dashboard.html" class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-right"></i>
        </a>
        <div class="header-info">
            <h1 id="chatTitle">الدردشة المباشرة</h1>
            <p id="chatSubtitle">...</p>
        </div>
        <div class="status" id="onlineStatus" style="display: none;">
            <span class="status-dot"></span>
            <span>الدعم متصل</span>
        </div>
    </div>

    <div class="image-preview" id="imagePreview">
        <img id="previewImage" src="" alt="">
        <div class="image-preview-close" onclick="clearSelectedImage()">
            <i class="fas fa-times"></i>
        </div>
    </div>

    <div class="upload-progress" id="uploadProgress">
        <div class="upload-spinner"></div>
        <span>جاري رفع الصورة...</span>
    </div>

    <div id="chatContainer" style="display: none;">
        <div class="chat-area" id="messagesContainer"></div>
        <div class="input-area">
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <div class="image-upload-btn" onclick="document.getElementById('imageInput').click()">
                <i class="fas fa-image"></i>
            </div>
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." disabled>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="startContainer" class="start-page">
        <div class="start-icon">
            <i class="fas fa-comments"></i>
        </div>
        <h2>مرحباً بك</h2>
        <p>يمكنك التواصل مع فريق الدعم<br>نحن هنا لمساعدتك على مدار الساعة</p>
        <button class="start-btn" onclick="startChat()">
            <i class="fas fa-play"></i>
            بدء المحادثة
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;
        let currentChat = null;
        let messageInterval = null;
        let selectedImage = null;
        let isAdmin = false;
        let isSendingAutoReply = false;
        let lastUserMessageTime = 0;
        let processedMessageIds = new Set();

        // ========== نظام الردود التلقائية ==========
        const AUTO_REPLIES = {
            // الرد الترحيبي الأول
            welcome: "👋 أهلاً بك في Elite Capital!\n\n"

                + "سنسعد بخدمتك على مدار الساعة! 💎",
            
            // ردود ذكية حسب الكلمات المفتاحية
            keywords: [
                {
                    words: ['سحب', 'withdrawal', 'withdraw', 'اسحب', 'مسحوبات'],
                    reply: "💰 عملية السحب:\n\n"
                        + "• الحد الأدنى للسحب: 50$ USDT\n"

                },
                {

                    reply: "📈 نظام الأرباح اليومية:\n\n"
                        + "• يتم المطالبة بالأرباح مرة واحدة كل 24 ساعة\n"
                        + "• الأرباح تضاف تلقائياً إلى رصيدك\n"
                        + "• يمكنك إعادة استثمار أرباحك أو سحبها\n\n"
                        + "⚠️ ملاحظة: المطالبة المتكررة تؤدي إلى تعليق الحساب\n\n"
                        + "للمساعدة: @mr_tony5"
                },
                {
                    words: ['حساب', 'account', 'معلق', 'suspended', 'تجميد'],
                    reply: "⚠️ تعليق الحساب:\n\n"
                        + "يتم تعليق الحساب في الحالات التالية:\n"
                        + "• محاولة المطالبة المتكررة بالأرباح\n"
                        + "• مخالفة شروط الاستخدام\n\n"
                        + "مدة التعليق: 3-7 أيام حسب المخالفة\n\n"
                        + "للاستفسار عن حسابك: @mr_tony5"
                },
                {
                    words: ['ترقية', 'upgrade', 'vip', 'مميزة', 'ذهبية'],
                    reply: "⭐ ترقية الباقة:\n\n"
                        + "يمكنك ترقية باقتك في أي وقت\n"
                        + "يتم خصم قيمة الباقة القديمة من الجديدة\n"
                        + "للترقية، تواصل مع الدعم: @mr_tony5"
                },
                {
                    words: ['تحويل', 'transfer', 'محفظة', 'wallet'],
                    reply: "💳 معلومات المحفظة:\n\n"
                        + "العنوان: TH7am2Vu7jTyxSYTSo9tUS4NC11KVxDuVi\n"
                        + "الشبكة: TRC20 فقط\n\n"
                        + "⚠️ تأكد من استخدام الشبكة الصحيحة\n\n"
                        + "للمساعدة: @mr_tony5"
                },
                {
                    words: ['دعم', 'support', 'مساعدة', 'help', 'مشكلة', 'problem'],
                    reply: "🛠️ الدعم الفني:\n\n"
                        + "للتواصل المباشر مع خدمة العملاء:\n"
                        + "📱 تيليجرام: @mr_tony5\n\n"
                        + "سنرد عليك في أقرب وقت ممكن!\n"
                        + "شكراً لثقتك في Elite Capital 💎"
                },
                {
                    words: ['احالة', 'referral', 'refer', 'كود', 'دعوة'],
                    reply: "🎁 نظام الإحالة المميز:\n\n"
                        + "• المكافأة للداعي: 50$ لكل مشترك جديد\n"
                        + "• المكافأة للصديق: 20$ عند الاشتراك\n\n"
                        + "انسخ كود الإحالة من لوحة التحكم\n\n"
                        + "للاستفسار: @mr_tony5"
                },
                {
                    words: ['تأخير', 'delay', 'وقت', 'time', 'متى'],
                    reply: "⏰ أوقات المعالجة:\n\n"
                        + "• تفعيل الاشتراك: 3-4 ساعات\n"
                        + "• طلبات السحب: 24-48 ساعة\n"
                        + "• الرد على الاستفسارات: فوري خلال الدوام\n\n"
                        + "للحالات العاجلة: @mr_tony5"
                }
            ],
            
            // الرد الافتراضي إذا لم يتطابق مع أي كلمة
            defaultReply: "🙏 شكراً لتواصلك مع Elite Capital!\n\n"
                + "سيتم الرد على استفسارك في أقرب وقت.\n\n"
                + "📌 للتواصل الفوري والمباشر:\n"
                + "👉 تيليجرام: @mr_tony5\n\n"
                + "نتمنى لك يوماً موفقاً! 💎"
        };

        // دالة البحث عن الرد المناسب
        function getAutoReply(message) {
            if (!message) return AUTO_REPLIES.defaultReply;
            
            const msg = message.toLowerCase();
            
            // البحث عن الكلمات المفتاحية
            for (const item of AUTO_REPLIES.keywords) {
                for (const word of item.words) {
                    if (msg.includes(word.toLowerCase())) {
                        return item.reply;
                    }
                }
            }
            
            return AUTO_REPLIES.defaultReply;
        }

        // دالة إرسال الرد التلقائي
        async function sendAutoReply(userMessage, userId) {
            if (isSendingAutoReply) return;
            isSendingAutoReply = true;
            
            try {
                // عرض مؤشر الكتابة
                showTypingIndicator();
                
                // انتظار محاكاة الكتابة (1-2 ثانية)
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // إخفاء مؤشر الكتابة
                hideTypingIndicator();
                
                // الحصول على الرد المناسب
                const reply = getAutoReply(userMessage);
                
                // إرسال الرد التلقائي
                const result = await window.supabaseHelpers.sendChatMessage(
                    currentChat.id,
                    currentUser.id,
                    reply
                );
                
                if (result.success) {
                    console.log('✅ تم إرسال الرد التلقائي');
                    await loadMessages();
                }
            } catch (error) {
                console.error('خطأ في إرسال الرد التلقائي:', error);
            } finally {
                isSendingAutoReply = false;
            }
        }

        // عرض مؤشر الكتابة
        function showTypingIndicator() {
            const container = document.getElementById('messagesContainer');
            const indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'typing-indicator';
            indicator.innerHTML = `
                <span>الدعم يكتب</span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
            `;
            container.appendChild(indicator);
            container.scrollTop = container.scrollHeight;
        }

        // إخفاء مؤشر الكتابة
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // ========== دوال الدردشة الأساسية ==========
        
        async function checkUser() {
            const savedUser = localStorage.getItem('current_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
            
            if (window.supabaseHelpers) {
                const result = await window.supabaseHelpers.getUserById(currentUser.id);
                if (result.success && result.data) {
                    currentUser = result.data;
                    isAdmin = currentUser.is_admin || false;
                }
            }
        }

        async function checkExistingChat() {
            try {
                const result = await window.supabaseHelpers.getUserActiveChat(currentUser.id);
                if (result.success && result.data) {
                    currentChat = result.data;
                    showChatInterface();
                    await loadMessages();
                    messageInterval = setInterval(loadMessages, 3000);
                } else {
                    showStartInterface();
                }
            } catch (error) {
                showStartInterface();
            }
        }

        function showChatInterface() {
            document.getElementById('startContainer').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'block';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatSubtitle').textContent = 'محادثة نشطة';
            document.getElementById('onlineStatus').style.display = currentChat?.admin_id ? 'flex' : 'none';
            setTimeout(() => document.getElementById('messageInput').focus(), 500);
        }

        function showStartInterface() {
            document.getElementById('startContainer').style.display = 'flex';
            document.getElementById('chatContainer').style.display = 'none';
        }

        async function startChat() {
            try {
                showToast('جاري بدء المحادثة...', 'info');
                const result = await window.supabaseHelpers.startLiveChat(currentUser.id);
                if (result.success) {
                    currentChat = result.data;
                    showChatInterface();
                    await loadMessages();
                    
                    // إرسال رسالة الترحيب مع زر التيليجرام
                    setTimeout(async () => {
                        await sendWelcomeMessage();
                    }, 1000);
                    
                    messageInterval = setInterval(loadMessages, 3000);
                    showToast('✅ تم بدء المحادثة');
                } else {
                    showToast('❌ ' + result.error, 'error');
                }
            } catch (error) {
                showToast('❌ حدث خطأ', 'error');
            }
        }

        // رسالة الترحيب الأولى مع زر التيليجرام
        async function sendWelcomeMessage() {
            if (!currentChat) return;
            
            const welcomeMessage = "👋 أهلاً بك في Elite Capital!\n\n"
                + "📌 للتواصل المباشر مع خدمة العملاء:\n\n"
                + "👉 تواصل معنا عبر تيليجرام:\n"
                + "🔗 @mr_tony5\n\n"
                + "او اضغط على الزر أدناه للتواصل المباشر.\n\n"
                + "سنسعد بخدمتك على مدار الساعة! 💎";
            
            // إضافة زر التيليجرام كرسالة منفصلة
            await window.supabaseHelpers.sendChatMessage(
                currentChat.id,
                currentUser.id,
                welcomeMessage
            );
            
            // إرسال رسالة تحتوي على زر التيليجرام (كـ HTML)
            const telegramMessage = "📱 للتواصل المباشر: اضغط على الرابط👇\n\nhttps://t.me/mr_tony5";
            await window.supabaseHelpers.sendChatMessage(
                currentChat.id,
                currentUser.id,
                telegramMessage
            );
            
            await loadMessages();
        }

        async function loadMessages() {
            if (!currentChat) return;
            try {
                const result = await window.supabaseHelpers.getChatMessages(currentChat.id);
                if (result.success && result.data) {
                    displayMessages(result.data);
                    
                    // التحقق من الرسائل الجديدة من المستخدم للرد التلقائي
                    const userMessages = result.data.filter(msg => 
                        msg.user_id === currentUser.id && 
                        !msg.is_deleted &&
                        !processedMessageIds.has(msg.id) &&
                        new Date(msg.created_at).getTime() > lastUserMessageTime
                    );
                    
                    for (const msg of userMessages) {
                        if (msg.message && !isAdmin) {
                            processedMessageIds.add(msg.id);
                            lastUserMessageTime = new Date(msg.created_at).getTime();
                            await sendAutoReply(msg.message, currentUser.id);
                        }
                    }
                    
                    await window.supabaseHelpers.markMessagesAsRead(currentChat.id, currentUser.id);
                }
            } catch (error) {
                console.error('خطأ:', error);
            }
        }

        async function loadAndDisplayImage(imageId, imgElement, loadingDiv) {
            try {
                const result = await window.supabaseHelpers.getChatImage(imageId);
                if (result.success) {
                    imgElement.src = result.data;
                    imgElement.style.display = 'block';
                    if (loadingDiv) loadingDiv.style.display = 'none';
                }
            } catch (error) {
                if (loadingDiv) loadingDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> فشل التحميل';
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            let html = '';
            let lastDate = null;
            
            messages.forEach(msg => {
                if (msg.is_deleted && !isAdmin) return;
                
                const isUser = msg.user_id === currentUser.id;
                const msgDate = new Date(msg.created_at);
                const dateStr = msgDate.toLocaleDateString('ar-SA');
                const timeStr = msgDate.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
                
                if (lastDate !== dateStr) {
                    html += `<div class="date-divider"><span>${dateStr}</span></div>`;
                    lastDate = dateStr;
                }
                
                let messageContent = '';
                if (msg.is_deleted) {
                    messageContent = `<div class="message-deleted"><i class="fas fa-trash"></i> تم حذف الرسالة</div>`;
                } else {
                    if (msg.image_url) {
                        if (msg.image_url.startsWith('image:')) {
                            const imageId = msg.image_url.replace('image:', '');
                            messageContent += `<div><img class="chat-image" data-image-id="${imageId}" style="display:none;" onclick="showFullImage(this)"><div class="image-loading" data-image-id="${imageId}"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div></div>`;
                        } else {
                            messageContent += `<img src="${msg.image_url}" class="chat-image" onclick="showFullImage(this)">`;
                        }
                    }
                    if (msg.message) {
                        // معالجة الروابط لجعلها قابلة للنقر
                        let formattedMessage = msg.message.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#c8a97e;text-decoration:underline;">$1</a>');
                        formattedMessage = formattedMessage.replace(/@(\w+)/g, '<a href="https://t.me/$1" target="_blank" style="color:#c8a97e;text-decoration:underline;">@$1</a>');
                        messageContent += `<div>${formattedMessage}</div>`;
                    }
                }
                
                if (isUser) {
                    html += `<div class="message-user"><div class="message-user-content">${messageContent}<div class="message-info"><span>أنت</span><span>•</span><span>${timeStr}</span><span>${msg.is_read ? '✓✓' : '✓'}</span></div></div></div>`;
                } else {
                    const senderName = msg.users?.is_admin ? '🎖️ الدعم' : (msg.users?.name || 'مستخدم');
                    html += `<div class="message-support"><div class="message-support-content">${messageContent}<div class="message-info"><span>${senderName}</span><span>•</span><span>${timeStr}</span></div></div></div>`;
                }
            });
            
            if (messages.length === 0) html = '<div class="no-messages">لا توجد رسائل بعد</div>';
            container.innerHTML = html;
            
            messages.forEach(msg => {
                if (msg.image_url && msg.image_url.startsWith('image:')) {
                    const imageId = msg.image_url.replace('image:', '');
                    setTimeout(() => {
                        const img = document.querySelector(`img[data-image-id="${imageId}"]`);
                        const loading = document.querySelector(`.image-loading[data-image-id="${imageId}"]`);
                        if (img && loading) loadAndDisplayImage(imageId, img, loading);
                    }, 100);
                }
            });
            
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if ((!message && !selectedImage) || !currentChat) return;
            
            if (selectedImage) await sendImageMessage(selectedImage);
            
            if (message) {
                input.value = '';
                await window.supabaseHelpers.sendChatMessage(currentChat.id, currentUser.id, message);
                await loadMessages();
            }
            
            clearSelectedImage();
        }

        async function sendImageMessage(file) {
            const progressDiv = document.getElementById('uploadProgress');
            try {
                progressDiv.classList.add('active');
                if (file.size > 5 * 1024 * 1024) throw new Error('حجم الصورة كبير جداً');
                const result = await window.supabaseHelpers.uploadChatImage(file, currentUser.id);
                if (result.success) {
                    await window.supabaseHelpers.sendChatMessage(currentChat.id, currentUser.id, null, result.data.url);
                    showToast('✅ تم إرسال الصورة');
                }
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            } finally {
                progressDiv.classList.remove('active');
            }
        }

        document.getElementById('imageInput').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const file = e.target.files[0];
                if (!file.type.startsWith('image/')) {
                    showToast('❌ الرجاء اختيار صورة فقط', 'error');
                    return;
                }
                if (file.size > 5 * 1024 * 1024) {
                    showToast('❌ حجم الصورة كبير جداً', 'error');
                    return;
                }
                selectedImage = file;
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('previewImage').src = event.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function clearSelectedImage() {
            selectedImage = null;
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageInput').value = '';
        }

        function showFullImage(imgElement) {
            document.getElementById('modalImage').src = imgElement.src;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function goBack() {
            if (messageInterval) clearInterval(messageInterval);
            window.location.href = 'dashboard.html';
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (type === 'error' ? 'error' : type === 'warning' ? 'warning' : '');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await checkUser();
            await checkExistingChat();
        });

        window.addEventListener('beforeunload', () => {
            if (messageInterval) clearInterval(messageInterval);
        });
    </script>
</body>
</html>
