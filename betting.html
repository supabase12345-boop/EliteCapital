<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Capital | المراهنات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #1a2639 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        /* Header أنيق */
        .glass-header {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200,169,126,0.2);
            border-radius: 30px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            background: rgba(200,169,126,0.1);
            border: 1px solid #c8a97e;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8a97e;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #c8a97e;
            color: #0b1120;
            transform: rotate(90deg);
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, #c8a97e, #e4cba3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(39,174,96,0.15), rgba(46,204,113,0.15));
            border: 2px solid #27ae60;
            border-radius: 50px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #27ae60;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 0 20px rgba(39,174,96,0.2);
        }

        /* Stats Cards حديثة */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(200,169,126,0.15);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #c8a97e;
            box-shadow: 0 10px 30px rgba(200,169,126,0.15);
        }

        .stat-icon {
            font-size: 28px;
            color: #c8a97e;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        /* Quick Guide */
        .quick-guide {
            background: linear-gradient(135deg, rgba(200,169,126,0.1), rgba(179,139,91,0.1));
            border: 1px solid #c8a97e;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .guide-chip {
            background: rgba(200,169,126,0.15);
            padding: 8px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #c8a97e;
            font-size: 14px;
        }

        .guide-chip i {
            font-size: 16px;
        }

        .guide-chip.highlight {
            background: #c8a97e;
            color: #0b1120;
        }

        /* Match Cards - تصميم جديد */
        .match-card {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200,169,126,0.15);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #c8a97e, #e4cba3, #c8a97e);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .match-league {
            background: rgba(200,169,126,0.15);
            padding: 6px 18px;
            border-radius: 40px;
            color: #c8a97e;
            font-size: 13px;
            border: 1px solid rgba(200,169,126,0.3);
        }

        .match-time {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        .match-time i {
            color: #c8a97e;
        }

        /* Teams - أفقي */
        .teams-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .team-block {
            flex: 1;
            text-align: center;
        }

        .team-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, rgba(200,169,126,0.15), rgba(200,169,126,0.05));
            border: 2px solid #c8a97e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            font-weight: bold;
            color: #c8a97e;
        }

        .team-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .vs-badge {
            width: 45px;
            height: 45px;
            background: #c8a97e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0b1120;
            font-weight: 900;
            font-size: 16px;
            box-shadow: 0 0 20px rgba(200,169,126,0.3);
        }

        /* Bet Options */
        .bet-options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .bet-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.2);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .bet-card:hover {
            border-color: #c8a97e;
            background: rgba(200,169,126,0.1);
            transform: translateY(-2px);
        }

        .bet-card.selected {
            background: #c8a97e;
        }

        .bet-card.selected .bet-type,
        .bet-card.selected .bet-odds {
            color: #0b1120;
        }

        .bet-type {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
        }

        .bet-odds {
            font-size: 22px;
            font-weight: 900;
            color: #c8a97e;
        }

        /* Exact Score Section */
        .exact-section {
            background: rgba(200,169,126,0.05);
            border: 1px dashed #c8a97e;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .exact-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #c8a97e;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .exact-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .exact-col {
            flex: 1;
            text-align: center;
        }

        .exact-col .team-label {
            color: #c8a97e;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .exact-col input {
            width: 100%;
            max-width: 120px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #c8a97e;
            border-radius: 15px;
            color: white;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin: 0 auto;
        }

        .exact-col input::placeholder {
            color: transparent;
        }

        .exact-col input:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(200,169,126,0.3);
        }

        .exact-divider {
            font-size: 24px;
            font-weight: 900;
            color: #c8a97e;
        }

        .exact-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #c8a97e;
            color: #0b1120;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            margin-top: 20px;
        }

        /* Amount Section */
        .amount-container {
            margin: 20px 0;
        }

        .amount-header {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            font-size: 14px;
        }

        .amount-field {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(200,169,126,0.3);
            border-radius: 20px;
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .amount-field:focus {
            outline: none;
            border-color: #c8a97e;
        }

        .quick-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .quick-chip {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.3);
            border-radius: 30px;
            padding: 8px 18px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        .quick-chip:hover {
            background: #c8a97e;
            color: #0b1120;
        }

        .profit-preview {
            background: linear-gradient(135deg, rgba(39,174,96,0.1), rgba(46,204,113,0.1));
            border: 2px solid #27ae60;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }

        .profit-label {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .profit-value {
            font-size: 36px;
            font-weight: 900;
            color: #27ae60;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #c8a97e, #b38b5b);
            border: none;
            border-radius: 30px;
            color: #0b1120;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(200,169,126,0.3);
        }

        /* History Section */
        .history-panel {
            margin-top: 40px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .panel-header i {
            font-size: 24px;
            color: #c8a97e;
        }

        .panel-header h3 {
            color: #c8a97e;
            font-size: 20px;
            flex: 1;
        }

        .history-list {
            background: rgba(255,255,255,0.02);
            border-radius: 25px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-entry {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .history-icon {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .history-icon.win { background: rgba(39,174,96,0.15); color: #27ae60; }
        .history-icon.loss { background: rgba(231,76,60,0.15); color: #e74c3c; }
        .history-icon.bet { background: rgba(200,169,126,0.15); color: #c8a97e; }

        .history-details {
            flex: 1;
        }

        .history-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .history-meta {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.97);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: linear-gradient(135deg, #1a2639, #0f1a2f);
            border-radius: 40px;
            padding: 35px;
            max-width: 400px;
            width: 100%;
            border: 2px solid #c8a97e;
        }

        .modal-icon {
            width: 70px;
            height: 70px;
            background: #c8a97e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
            color: #0b1120;
        }

        .modal-title {
            text-align: center;
            color: #c8a97e;
            font-size: 24px;
            margin-bottom: 25px;
        }

        .modal-content {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #c8a97e;
            color: white;
        }

        .btn-solid {
            background: #c8a97e;
            color: #0b1120;
        }

        .toast {
            position: fixed;
            top: 100px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            display: none;
            z-index: 1000;
            border-right: 4px solid white;
        }

        .toast.error {
            background: #e74c3c;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .teams-container {
                flex-direction: column;
                gap: 15px;
            }
            
            .exact-row {
                flex-direction: column;
            }
            
            .exact-divider {
                transform: rotate(90deg);
            }
        }
    </style>
</head>
<body>
    <div class="glass-header">
        <div class="logo-area">
            <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
            <span class="logo">ELITE CAPITAL</span>
        </div>
        <div class="balance-card" id="balanceDisplay">
            <i class="fas fa-wallet"></i>
            <span>0.00$</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-ticket-alt"></i></div>
            <div class="stat-number" id="totalBets">0</div>
            <div class="stat-label">رهاناتي</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-coins"></i></div>
            <div class="stat-number" id="totalAmount">0$</div>
            <div class="stat-label">إجمالي</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-trophy"></i></div>
            <div class="stat-number" id="totalWins">0$</div>
            <div class="stat-label">أرباحي</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            <div class="stat-number" id="netProfit">0$</div>
            <div class="stat-label">صافي</div>
        </div>
    </div>

    <div class="quick-guide">
        <div class="guide-chip"><i class="fas fa-trophy"></i> فوز/تعادل: x1.6</div>
        <div class="guide-chip highlight"><i class="fas fa-star"></i> نتيجة دقيقة: x2.5</div>
        <div class="guide-chip"><i class="fas fa-info-circle"></i> اضغط على الخانة لكتابة النتيجة</div>
    </div>

    <div id="matchesContainer"></div>

    <div class="history-panel">
        <div class="panel-header">
            <i class="fas fa-history"></i>
            <h3>النشاطات الأخيرة</h3>
            <div class="guide-chip" onclick="loadActivities()" style="cursor: pointer;">
                <i class="fas fa-sync-alt"></i> تحديث
            </div>
        </div>
        <div class="history-list" id="activitiesList">
            <p style="text-align: center; color: rgba(255,255,255,0.5); padding: 20px;">جاري التحميل...</p>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-card">
            <div class="modal-icon"><i class="fas fa-check"></i></div>
            <h3 class="modal-title">تأكيد الرهان</h3>
            <div class="modal-content" id="confirmDetails"></div>
            <div class="modal-actions">
                <button class="modal-btn btn-outline" onclick="closeModal()">إلغاء</button>
                <button class="modal-btn btn-solid" onclick="submitBet()">تأكيد</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;
        let allMatches = [];
        let userBets = [];
        let activities = [];
        let selectedMatch = null;
        let selectedBetType = null;
        let selectedBetValue = null;
        let selectedOdds = 1.6;
        let currentBetData = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await checkUser();
            await loadUserData();
            await loadMatches();
            await loadUserBets();
            await loadActivities();
        });

        async function checkUser() {
            const saved = localStorage.getItem('current_user');
            if (!saved) { window.location.href = 'index.html'; return; }
            currentUser = JSON.parse(saved);
            if (window.supabaseHelpers) {
                const result = await window.supabaseHelpers.getUserById(currentUser.id);
                if (result?.success) {
                    currentUser = result.data;
                    localStorage.setItem('current_user', JSON.stringify(currentUser));
                }
            }
        }

        async function loadUserData() {
            document.getElementById('balanceDisplay').innerHTML = `
                <i class="fas fa-wallet"></i> <span>${(currentUser.balance || 0).toFixed(2)}$</span>
            `;
        }

        async function loadMatches() {
            const result = await window.supabaseHelpers?.getAllMatches();
            if (result?.success) {
                allMatches = result.data.filter(m => m.status === 'upcoming');
                displayMatches();
            }
        }

        function displayMatches() {
            const container = document.getElementById('matchesContainer');
            if (!allMatches.length) {
                container.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">لا توجد مباريات</p>';
                return;
            }

            let html = '';
            allMatches.forEach(match => {
                const date = new Date(match.match_date);
                html += `
                    <div class="match-card" id="match-${match.id}">
                        <div class="match-header">
                            <span class="match-league">${match.league || 'الدوري'}</span>
                            <span class="match-time"><i class="far fa-clock"></i> ${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}</span>
                        </div>

                        <div class="teams-container">
                            <div class="team-block">
                                <div class="team-avatar">${match.team1?.charAt(0) || 'A'}</div>
                                <div class="team-name">${match.team1}</div>
                            </div>
                            <div class="vs-badge">VS</div>
                            <div class="team-block">
                                <div class="team-avatar">${match.team2?.charAt(0) || 'B'}</div>
                                <div class="team-name">${match.team2}</div>
                            </div>
                        </div>

                        <div class="bet-options-grid" id="options-${match.id}">
                            <div class="bet-card" onclick="selectBet(${match.id}, '1', 1.6)">
                                <div class="bet-type">فوز</div>
                                <div class="bet-odds">1.6</div>
                            </div>
                            <div class="bet-card" onclick="selectBet(${match.id}, 'X', 1.6)">
                                <div class="bet-type">تعادل</div>
                                <div class="bet-odds">1.6</div>
                            </div>
                            <div class="bet-card" onclick="selectBet(${match.id}, '2', 1.6)">
                                <div class="bet-type">فوز</div>
                                <div class="bet-odds">1.6</div>
                            </div>
                        </div>

                        <div class="exact-section">
                            <div class="exact-title"><i class="fas fa-bullseye"></i> إجمالي الأهداف المتوقعة:</div>
                            <div class="exact-row">
                                <div class="exact-col">
                                    <div class="team-label">${match.team1}</div>
                                    <input type="number" id="score1-${match.id}" min="0" max="10" placeholder=" " oninput="updateExact(${match.id})">
                                </div>
                                <div class="exact-divider">-</div>
                                <div class="exact-col">
                                    <div class="team-label">${match.team2}</div>
                                    <input type="number" id="score2-${match.id}" min="0" max="10" placeholder=" " oninput="updateExact(${match.id})">
                                </div>
                            </div>
                            <div class="exact-badge"><i class="fas fa-star"></i> نتيجة دقيقة x2.5</div>
                        </div>

                        <div id="amount-section-${match.id}" style="display: none;">
                            <div class="amount-header">
                                <span>💰 مبلغ الرهان</span>
                                <span>${(currentUser.balance || 0).toFixed(2)}$</span>
                            </div>
                            <input type="number" class="amount-field" id="amount-${match.id}" placeholder="أدخل المبلغ" min="5" oninput="updateProfit(${match.id})">
                            
                            <div class="quick-panel">
                                <span class="quick-chip" onclick="setAmount(${match.id}, 10)">10$</span>
                                <span class="quick-chip" onclick="setAmount(${match.id}, 25)">25$</span>
                                <span class="quick-chip" onclick="setAmount(${match.id}, 50)">50$</span>
                                <span class="quick-chip" onclick="setAmount(${match.id}, 100)">100$</span>
                            </div>

                            <div class="profit-preview" id="profit-${match.id}">
                                <div class="profit-label">الربح المحتمل</div>
                                <div class="profit-value" id="profit-amount-${match.id}">0.00$</div>
                            </div>

                            <button class="action-btn" onclick="openModal(${match.id})">
                                <i class="fas fa-check-circle"></i> تأكيد الرهان
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function selectBet(matchId, value, odds) {
            document.querySelectorAll(`#options-${matchId} .bet-card`).forEach(opt => opt.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            selectedMatch = allMatches.find(m => m.id == matchId);
            selectedBetType = 'simple';
            selectedBetValue = value;
            selectedOdds = odds;
            document.getElementById(`amount-section-${matchId}`).style.display = 'block';
            document.getElementById(`score1-${matchId}`).value = '';
            document.getElementById(`score2-${matchId}`).value = '';
        }

        function updateExact(matchId) {
            const s1 = document.getElementById(`score1-${matchId}`).value;
            const s2 = document.getElementById(`score2-${matchId}`).value;
            if (s1 || s2) {
                document.querySelectorAll(`#options-${matchId} .bet-card`).forEach(opt => opt.classList.remove('selected'));
                selectedMatch = allMatches.find(m => m.id == matchId);
                selectedBetType = 'exact';
                selectedBetValue = `${s1 || 0}-${s2 || 0}`;
                selectedOdds = 2.5;
                document.getElementById(`amount-section-${matchId}`).style.display = 'block';
                const amount = document.getElementById(`amount-${matchId}`).value;
                if (amount) updateProfit(matchId);
            }
        }

        function updateProfit(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value) || 0;
            const s1 = document.getElementById(`score1-${matchId}`).value;
            const s2 = document.getElementById(`score2-${matchId}`).value;
            let odds = selectedOdds || 1.6;
            if (s1 || s2) odds = 2.5;
            const profit = amount * odds;
            document.getElementById(`profit-amount-${matchId}`).textContent = profit.toFixed(2) + '$';
        }

        function setAmount(matchId, amount) {
            document.getElementById(`amount-${matchId}`).value = amount;
            updateProfit(matchId);
        }

        function openModal(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value);
            const s1 = document.getElementById(`score1-${matchId}`).value;
            const s2 = document.getElementById(`score2-${matchId}`).value;
            
            if (!amount || amount < 5) { showToast('الحد الأدنى 5$', 'error'); return; }
            if (amount > currentUser.balance) { showToast('الرصيد غير كافي', 'error'); return; }

            let betText = '', odds = 1.6;
            if (s1 || s2) {
                betText = `${s1 || 0} - ${s2 || 0}`;
                odds = 2.5;
            } else if (selectedBetValue === '1') betText = selectedMatch.team1;
            else if (selectedBetValue === 'X') betText = 'تعادل';
            else if (selectedBetValue === '2') betText = selectedMatch.team2;
            else { showToast('اختر توقعك', 'error'); return; }

            const profit = amount * odds;
            document.getElementById('confirmDetails').innerHTML = `
                <div class="modal-row"><span>المباراة</span><span>${selectedMatch.team1} vs ${selectedMatch.team2}</span></div>
                <div class="modal-row"><span>توقعك</span><span>${betText}</span></div>
                <div class="modal-row"><span>نسبة الربح</span><span style="color: ${odds === 2.5 ? '#c8a97e' : '#27ae60'};">x${odds}</span></div>
                <div class="modal-row"><span>المبلغ</span><span>${amount}$</span></div>
                <div class="modal-row"><span>الربح</span><span style="color: #27ae60;">${profit.toFixed(2)}$</span></div>
            `;

            currentBetData = {
                matchId, amount, odds,
                betType: s1 || s2 ? 'exact' : 'simple',
                betValue: s1 || s2 ? `${s1 || 0}-${s2 || 0}` : selectedBetValue
            };
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        async function submitBet() {
            if (!currentBetData) return;
            const result = await window.supabaseHelpers?.placeBet({
                userId: currentUser.id,
                matchId: currentBetData.matchId,
                betType: currentBetData.betType,
                betValue: currentBetData.betValue,
                amount: currentBetData.amount,
                odds: currentBetData.odds
            });

            if (result?.success) {
                closeModal();
                showToast('✅ تم تقديم الرهان');
                await checkUser();
                await loadUserData();
                await loadUserBets();
                await loadMatches();
                await loadActivities();
            } else {
                showToast('❌ ' + (result?.error || 'فشل'), 'error');
            }
        }

        async function loadUserBets() {
            const result = await window.supabaseHelpers?.getUserBets(currentUser.id);
            if (result?.success) {
                userBets = result.data;
                updateStats();
            }
        }

        function updateStats() {
            const total = userBets.length;
            const amount = userBets.reduce((s, b) => s + b.amount, 0);
            const won = userBets.filter(b => b.status === 'won').reduce((s, b) => s + (b.paid_amount || 0), 0);
            document.getElementById('totalBets').textContent = total;
            document.getElementById('totalAmount').textContent = amount.toFixed(2) + '$';
            document.getElementById('totalWins').textContent = won.toFixed(2) + '$';
            document.getElementById('netProfit').textContent = (won - amount).toFixed(2) + '$';
        }

        async function loadActivities() {
            if (!window.supabaseClient) return;
            const { data } = await supabaseClient.from('activity_log').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(20);
            activities = data || [];
            const list = document.getElementById('activitiesList');
            if (!activities.length) {
                list.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.5);">لا توجد نشاطات</p>';
                return;
            }
            let html = '';
            activities.forEach(act => {
                let icon = 'fa-clock', cls = 'bet';
                if (act.type === 'profit') { icon = 'fa-coins'; cls = 'win'; }
                else if (act.type === 'bet') { icon = 'fa-futbol'; cls = 'bet'; }
                const date = new Date(act.created_at).toLocaleDateString('ar-SA');
                html += `
                    <div class="history-entry">
                        <div class="history-icon ${cls}"><i class="fas ${icon}"></i></div>
                        <div class="history-details">
                            <div class="history-title">${act.title || 'نشاط'}</div>
                            <div class="history-meta">${act.description || ''} • ${date}</div>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
