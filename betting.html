<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المراهنات الرياضية - Elite Capital</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c8a97e;
            --primary-dark: #b38b5b;
            --primary-light: #dac09a;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --gold: #c8a97e;
            --gold-light: rgba(200, 169, 126, 0.15);
            --shadow-gold: 0 10px 30px rgba(200, 169, 126, 0.3);
            --gradient-gold: linear-gradient(135deg, #c8a97e, #b38b5b);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(200, 169, 126, 0.2);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* شريط علوي أنيق */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 22px;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--gold);
            color: var(--dark);
            transform: rotate(90deg);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: var(--gradient-gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--dark);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 900;
            color: var(--gold);
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(39,174,96,0.15), rgba(46,204,113,0.15));
            border: 2px solid var(--success);
            border-radius: 40px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--success);
            font-weight: 700;
            font-size: 18px;
            backdrop-filter: blur(5px);
        }

        .balance-card i {
            font-size: 20px;
        }

        /* المحتوى الرئيسي */
        .main {
            margin-top: 90px;
            padding: 20px 25px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        /* بطاقة المباراة - مثل الصورة بالضبط */
        .match-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-gold);
        }

        /* رأس البطاقة - الدوري والوقت */
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .match-league {
            background: var(--gold-light);
            border: 1px solid var(--gold);
            border-radius: 30px;
            padding: 5px 18px;
            color: var(--gold);
            font-weight: 500;
        }

        .match-time {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .match-time i {
            color: var(--gold);
        }

        /* الفرق بشكل أفقي - مثل الصورة */
        .teams-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 80px;
            padding: 20px 30px;
            border: 1px solid var(--glass-border);
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .team-logo {
            width: 80px;
            height: 80px;
            background: rgba(200, 169, 126, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: var(--gold);
            border: 3px solid var(--gold);
            margin-bottom: 12px;
            box-shadow: var(--shadow-gold);
        }

        .team-name {
            font-size: 22px;
            font-weight: 900;
            color: var(--text);
        }

        .team-name small {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
            margin-right: 5px;
        }

        .vs-circle {
            width: 60px;
            height: 60px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            font-size: 24px;
            font-weight: 900;
            box-shadow: var(--shadow-gold);
        }

        /* مربع النتيجة الدقيقة - مثل الصورة */
        .exact-score-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px dashed var(--gold);
        }

        .exact-score-title {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exact-score-title i {
            color: var(--gold);
        }

        .score-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .score-field {
            width: 100px;
            text-align: center;
        }

        .score-field label {
            display: block;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .score-field input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--gold);
            border-radius: 20px;
            color: white;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
        }

        .score-field input:focus {
            outline: none;
            box-shadow: var(--shadow-gold);
        }

        .score-dash {
            font-size: 40px;
            color: var(--gold);
            font-weight: 900;
        }

        /* توقعات الأهداف */
        .goals-prediction {
            background: var(--gold-light);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--gold);
        }

        .goals-prediction span {
            color: var(--gold);
            font-weight: 700;
        }

        .goals-prediction strong {
            font-size: 22px;
            color: var(--gold);
        }

        /* قسم المبلغ - مثل الصورة */
        .amount-section {
            margin-bottom: 25px;
        }

        .amount-label {
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .amount-label i {
            color: var(--gold);
        }

        .amount-input-container {
            position: relative;
            margin-bottom: 15px;
        }

        .amount-input {
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            color: white;
            font-size: 20px;
            padding-right: 60px;
        }

        .amount-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .currency-badge {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-weight: 900;
            font-size: 18px;
        }

        .min-amount {
            color: var(--text-muted);
            font-size: 13px;
            margin-right: 10px;
        }

        /* مبالغ سريعة */
        .quick-amounts {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .quick-amount {
            flex: 1;
            min-width: 70px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-muted);
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .quick-amount:hover {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
        }

        /* الربح المحتمل - مثل الصورة */
        .profit-box {
            background: linear-gradient(135deg, rgba(39,174,96,0.15), rgba(46,204,113,0.15));
            border: 2px solid var(--success);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
        }

        .profit-label {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .profit-label i {
            color: var(--success);
        }

        .profit-amount {
            font-size: 48px;
            font-weight: 900;
            color: var(--success);
            line-height: 1;
        }

        .profit-amount small {
            font-size: 20px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* زر التأكيد - مثل الصورة */
        .confirm-btn {
            width: 100%;
            padding: 22px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 50px;
            color: var(--dark);
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: var(--shadow-gold);
        }

        .confirm-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(200, 169, 126, 0.4);
        }

        .confirm-btn i {
            font-size: 24px;
        }

        /* خيارات الرهان الثلاثة */
        .bet-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .bet-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .bet-option:hover {
            border-color: var(--gold);
            background: var(--gold-light);
        }

        .bet-option.selected {
            background: var(--gold);
            border-color: var(--gold);
        }

        .bet-option.selected .bet-label,
        .bet-option.selected .bet-value {
            color: var(--dark);
        }

        .bet-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .bet-value {
            font-size: 22px;
            font-weight: 900;
            color: var(--gold);
        }

        /* نافذة التأكيد */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 50px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 3px solid var(--gold);
            text-align: center;
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: var(--dark);
        }

        .modal-title {
            color: var(--gold);
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 25px;
        }

        .modal-details {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .modal-label {
            color: var(--text-muted);
        }

        .modal-value {
            font-weight: 700;
            color: var(--gold);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
        }

        .modal-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-btn.cancel {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--text);
        }

        .modal-btn.confirm {
            background: var(--gold);
            color: var(--dark);
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        /* سجل الرهانات */
        .history-section {
            margin-top: 40px;
        }

        .history-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .history-header i {
            font-size: 24px;
            color: var(--gold);
        }

        .history-header h3 {
            color: var(--gold);
            font-size: 20px;
            flex: 1;
        }

        .history-list {
            background: var(--glass-bg);
            border-radius: 30px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .history-icon {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .history-icon.won { background: rgba(39,174,96,0.2); color: var(--success); }
        .history-icon.lost { background: rgba(231,76,60,0.2); color: var(--danger); }
        .history-icon.pending { background: rgba(243,156,18,0.2); color: var(--warning); }

        .history-info {
            flex: 1;
        }

        .history-match {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .history-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* إشعارات */
        .toast {
            position: fixed;
            top: 120px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 16px 28px;
            border-radius: 60px;
            display: none;
            z-index: 1000;
            border-right: 4px solid white;
            font-weight: 600;
        }

        .toast.error { background: var(--danger); }

        @media (max-width: 768px) {
            .teams-container {
                flex-direction: column;
                gap: 15px;
                border-radius: 40px;
            }
            
            .vs-circle {
                transform: rotate(90deg);
            }
            
            .logo-text {
                display: none;
            }
            
            .score-inputs {
                flex-direction: column;
            }
            
            .score-dash {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- شريط علوي أنيق -->
    <div class="navbar">
        <div class="nav-left">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
            </a>
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="logo-text">ELITE CAPITAL</div>
            </div>
        </div>
        <div class="balance-card" id="balanceDisplay">
            <i class="fas fa-wallet"></i>
            <span>0$</span>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main">
        <!-- المباريات ستظهر هنا ديناميكياً -->
        <div id="matchesContainer"></div>

        <!-- سجل الرهانات -->
        <div class="history-section">
            <div class="history-header">
                <i class="fas fa-history"></i>
                <h3>سجل رهاناتي</h3>
                <button class="quick-amount" onclick="loadUserBets()" style="width: auto;">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="history-list" id="betsHistory">
                <p style="text-align: center; color: var(--text-muted); padding: 20px;">جاري التحميل...</p>
            </div>
        </div>
    </div>

    <!-- نافذة التأكيد -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-check"></i>
            </div>
            <h3 class="modal-title">تأكيد الرهان</h3>
            <div class="modal-details" id="confirmDetails"></div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeConfirmModal()">إلغاء</button>
                <button class="modal-btn confirm" onclick="submitBet()">تأكيد</button>
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;
        let allMatches = [];
        let userBets = [];
        let selectedMatch = null;
        let selectedBetType = null;
        let selectedBetValue = null;
        let selectedOdds = 1.6;
        let currentBetData = null;

        document.addEventListener('DOMContentLoaded', async function() {
            await checkUser();
            await loadUserBalance();
            await loadMatches();
            await loadUserBets();
        });

        async function checkUser() {
            const savedUser = localStorage.getItem('current_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
            
            if (window.supabaseHelpers) {
                const result = await window.supabaseHelpers.getUserById(currentUser.id);
                if (result.success) {
                    currentUser = result.data;
                    localStorage.setItem('current_user', JSON.stringify(currentUser));
                }
            }
        }

        async function loadUserBalance() {
            document.getElementById('balanceDisplay').innerHTML = `
                <i class="fas fa-wallet"></i>
                <span>${(currentUser.balance || 0).toFixed(2)}$</span>
            `;
        }

        async function loadMatches() {
            try {
                const result = await window.supabaseHelpers.getAllMatches();
                if (result.success) {
                    allMatches = result.data;
                    displayMatches();
                }
            } catch (error) {
                console.error(error);
            }
        }

        function displayMatches() {
            const container = document.getElementById('matchesContainer');
            const now = new Date().toISOString();
            
            const activeMatches = allMatches.filter(m => 
                m.status === 'upcoming' && m.match_date > now
            );

            if (!activeMatches.length) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px; background: rgba(200,169,126,0.05); border-radius: 50px; border: 2px dashed var(--gold);">
                        <i class="fas fa-futbol" style="font-size: 60px; color: var(--gold); opacity: 0.5;"></i>
                        <h3 style="color: var(--gold); margin-top: 15px;">لا توجد مباريات متاحة</h3>
                        <p style="color: var(--text-muted);">سيتم إضافة مباريات قريباً</p>
                    </div>
                `;
                return;
            }

            let html = '';
            activeMatches.forEach(match => {
                const matchDate = new Date(match.match_date);
                
                html += `
                    <div class="match-card" id="match-${match.id}">
                        <!-- رأس البطاقة - الدوري والوقت -->
                        <div class="match-header">
                            <span class="match-league">${match.league || 'الدوري الإسباني'}</span>
                            <span class="match-time">
                                <i class="far fa-clock"></i>
                                ${matchDate.getHours().toString().padStart(2, '0')}:${matchDate.getMinutes().toString().padStart(2, '0')}
                            </span>
                        </div>

                        <!-- الفرق بشكل أفقي أنيق -->
                        <div class="teams-container">
                            <div class="team">
                                <div class="team-logo">${match.team1?.charAt(0) || 'A'}</div>
                                <div class="team-name">
                                    ${match.team1}
                                    <small>ريال</small>
                                </div>
                            </div>
                            <div class="vs-circle">VS</div>
                            <div class="team">
                                <div class="team-logo">${match.team2?.charAt(0) || 'B'}</div>
                                <div class="team-name">
                                    ${match.team2}
                                    <small>برشلونة</small>
                                </div>
                            </div>
                        </div>

                        <!-- خيارات الرهان الثلاثة -->
                        <div class="bet-options" id="bet-options-${match.id}">
                            <div class="bet-option" onclick="selectBet(${match.id}, '1', 1.6)">
                                <div class="bet-label">فوز</div>
                                <div class="bet-value">1.6</div>
                            </div>
                            <div class="bet-option" onclick="selectBet(${match.id}, 'X', 1.6)">
                                <div class="bet-label">تعادل</div>
                                <div class="bet-value">1.6</div>
                            </div>
                            <div class="bet-option" onclick="selectBet(${match.id}, '2', 1.6)">
                                <div class="bet-label">فوز</div>
                                <div class="bet-value">1.6</div>
                            </div>
                        </div>

                        <!-- النتيجة الدقيقة - مثل الصورة بالضبط -->
                        <div class="exact-score-box">
                            <div class="exact-score-title">
                                <i class="fas fa-bullseye"></i>
                                إجمالي الأهداف المتوقعة:
                            </div>
                            <div class="score-inputs">
                                <div class="score-field">
                                    <label>${match.team1}</label>
                                    <input type="number" id="score1-${match.id}" min="0" max="10" value="0" onchange="updateExact(${match.id})">
                                </div>
                                <span class="score-dash">-</span>
                                <div class="score-field">
                                    <label>${match.team2}</label>
                                    <input type="number" id="score2-${match.id}" min="0" max="10" value="0" onchange="updateExact(${match.id})">
                                </div>
                            </div>
                            <div class="goals-prediction">
                                <span>✨ مضاعف النتيجة الدقيقة</span>
                                <strong>x2.5</strong>
                            </div>
                        </div>

                        <!-- قسم المبلغ - مثل الصورة -->
                        <div class="amount-section" id="amount-section-${match.id}" style="display: none;">
                            <div class="amount-label">
                                <i class="fas fa-coins"></i>
                                مبلغ الرهان (5 $ فأكثر)
                            </div>
                            <div class="amount-input-container">
                                <input type="number" class="amount-input" id="amount-${match.id}" placeholder="أدخل المبلغ" min="5" oninput="updateProfit(${match.id})">
                                <span class="currency-badge">$</span>
                            </div>
                            <div class="min-amount">الحد الأدنى: 5$</div>

                            <!-- مبالغ سريعة -->
                            <div class="quick-amounts">
                                <span class="quick-amount" onclick="setAmount(${match.id}, 10)">10$</span>
                                <span class="quick-amount" onclick="setAmount(${match.id}, 25)">25$</span>
                                <span class="quick-amount" onclick="setAmount(${match.id}, 50)">50$</span>
                                <span class="quick-amount" onclick="setAmount(${match.id}, 100)">100$</span>
                                <span class="quick-amount" onclick="setAmount(${match.id}, 250)">250$</span>
                            </div>

                            <!-- الربح المحتمل -->
                            <div class="profit-box" id="profit-box-${match.id}">
                                <div class="profit-label">
                                    <i class="fas fa-chart-line"></i>
                                    الربح المحتمل
                                </div>
                                <div class="profit-amount" id="profit-amount-${match.id}">
                                    0 <small>$</small>
                                </div>
                            </div>

                            <!-- زر التأكيد -->
                            <button class="confirm-btn" onclick="openConfirmModal(${match.id})">
                                <i class="fas fa-check-circle"></i>
                                تأكيد الرهان
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // اختيار رهان عادي
        function selectBet(matchId, value, odds) {
            document.querySelectorAll(`#bet-options-${matchId} .bet-option`).forEach(opt => {
                opt.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            selectedMatch = allMatches.find(m => m.id == matchId);
            selectedBetType = 'simple';
            selectedBetValue = value;
            selectedOdds = odds;
            
            document.getElementById(`amount-section-${matchId}`).style.display = 'block';
            
            document.getElementById(`score1-${matchId}`).value = 0;
            document.getElementById(`score2-${matchId}`).value = 0;
        }

        // تحديث النتيجة الدقيقة
        function updateExact(matchId) {
            const score1 = parseInt(document.getElementById(`score1-${matchId}`).value) || 0;
            const score2 = parseInt(document.getElementById(`score2-${matchId}`).value) || 0;
            
            if (score1 > 0 || score2 > 0) {
                document.querySelectorAll(`#bet-options-${matchId} .bet-option`).forEach(opt => {
                    opt.classList.remove('selected');
                });
                
                selectedMatch = allMatches.find(m => m.id == matchId);
                selectedBetType = 'exact';
                selectedBetValue = `${score1}-${score2}`;
                selectedOdds = 2.5;
                
                document.getElementById(`amount-section-${matchId}`).style.display = 'block';
                
                const amount = document.getElementById(`amount-${matchId}`).value;
                if (amount) updateProfit(matchId);
            }
        }

        // تحديث الربح
        function updateProfit(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value) || 0;
            const score1 = parseInt(document.getElementById(`score1-${matchId}`).value) || 0;
            const score2 = parseInt(document.getElementById(`score2-${matchId}`).value) || 0;
            
            let odds = selectedOdds || 1.6;
            if (score1 > 0 || score2 > 0) odds = 2.5;
            
            const profit = amount * odds;
            document.getElementById(`profit-amount-${matchId}`).innerHTML = profit.toFixed(2) + ' <small>$</small>';
        }

        // تعيين مبلغ سريع
        function setAmount(matchId, amount) {
            document.getElementById(`amount-${matchId}`).value = amount;
            updateProfit(matchId);
        }

        // فتح نافذة التأكيد
        function openConfirmModal(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value);
            const score1 = parseInt(document.getElementById(`score1-${matchId}`).value) || 0;
            const score2 = parseInt(document.getElementById(`score2-${matchId}`).value) || 0;
            
            if (!amount || amount < 5) {
                showToast('الحد الأدنى للرهان 5$', 'error');
                return;
            }
            
            if (amount > currentUser.balance) {
                showToast('الرصيد غير كافي', 'error');
                return;
            }

            let betText = '';
            let odds = 1.6;
            
            if (score1 > 0 || score2 > 0) {
                betText = `${score1} - ${score2}`;
                odds = 2.5;
            } else if (selectedBetValue === '1') {
                betText = `فوز ${selectedMatch.team1}`;
            } else if (selectedBetValue === 'X') {
                betText = 'تعادل';
            } else if (selectedBetValue === '2') {
                betText = `فوز ${selectedMatch.team2}`;
            } else {
                showToast('اختر توقعك أولاً', 'error');
                return;
            }

            const profit = amount * odds;

            document.getElementById('confirmDetails').innerHTML = `
                <div class="modal-row">
                    <span class="modal-label">المباراة</span>
                    <span class="modal-value">${selectedMatch.team1} vs ${selectedMatch.team2}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">توقعك</span>
                    <span class="modal-value">${betText}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">نسبة الربح</span>
                    <span class="modal-value" style="color: ${odds === 2.5 ? 'var(--gold)' : 'var(--success)'};">x${odds}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">المبلغ</span>
                    <span class="modal-value">${amount}$</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">الربح المحتمل</span>
                    <span class="modal-value" style="color: var(--success); font-size: 22px;">${profit.toFixed(2)}$</span>
                </div>
            `;

            currentBetData = {
                matchId, amount, odds,
                betType: score1 > 0 || score2 > 0 ? 'exact' : 'simple',
                betValue: score1 > 0 || score2 > 0 ? `${score1}-${score2}` : selectedBetValue
            };

            document.getElementById('confirmModal').classList.add('active');
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        async function submitBet() {
            if (!currentBetData) return;

            const result = await window.supabaseHelpers.placeBet({
                userId: currentUser.id,
                matchId: currentBetData.matchId,
                betType: currentBetData.betType,
                betValue: currentBetData.betValue,
                amount: currentBetData.amount,
                odds: currentBetData.odds
            });

            if (result.success) {
                closeConfirmModal();
                showToast('✅ تم تقديم الرهان بنجاح');
                await checkUser();
                await loadUserBalance();
                await loadUserBets();
                await loadMatches();
            } else {
                showToast('❌ ' + result.error, 'error');
            }
        }

        async function loadUserBets() {
            try {
                const result = await window.supabaseHelpers.getUserBets(currentUser.id);
                if (result.success) {
                    userBets = result.data;
                    displayUserBets();
                }
            } catch (error) {
                console.error(error);
            }
        }

        function displayUserBets() {
            const container = document.getElementById('betsHistory');
            
            if (!userBets.length) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">لا توجد رهانات سابقة</p>';
                return;
            }

            let html = '';
            userBets.slice(0, 10).forEach(bet => {
                const match = bet.matches;
                const status = bet.status;
                
                html += `
                    <div class="history-item">
                        <div class="history-icon ${status}">
                            <i class="fas ${status === 'won' ? 'fa-trophy' : status === 'lost' ? 'fa-times' : 'fa-clock'}"></i>
                        </div>
                        <div class="history-info">
                            <div class="history-match">${match?.team1} vs ${match?.team2}</div>
                            <div class="history-meta">
                                <span>${bet.amount}$</span>
                                <span>x${bet.odds}</span>
                                <span>${bet.status === 'won' ? 'فائز' : bet.status === 'lost' ? 'خاسر' : 'معلق'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function logout() {
            localStorage.removeItem('current_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
