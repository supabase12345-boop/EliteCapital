<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>توقعات المباريات - Elite Capital</title>
    
    <!-- منع التخزين المؤقت -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c8a97e;
            --primary-dark: #b38b5b;
            --primary-light: #dac09a;
            --secondary: #2c3e50;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --gold: #c8a97e;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            --shadow-gold: 0 10px 30px rgba(200, 169, 126, 0.3);
            --gradient-gold: linear-gradient(135deg, #c8a97e, #b38b5b);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(200, 169, 126, 0.2);
            
            /* ألوان كرة القدم */
            --football-green: #27ae60;
            --football-red: #e74c3c;
            --football-yellow: #f1c40f;
            --football-blue: #3498db;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="%23c8a97e" stroke-width="0.5" opacity="0.05"/></svg>') repeat;
            pointer-events: none;
            z-index: -1;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* الشريط العلوي */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--gold);
            color: var(--dark);
            transform: rotate(90deg);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i {
            font-size: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .date-badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text-muted);
            backdrop-filter: blur(10px);
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--dark);
            cursor: pointer;
            border: 2px solid var(--gold);
            position: relative;
        }

        .user-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--dark);
        }

        /* قائمة المستخدم */
        .user-dropdown {
            position: absolute;
            top: 60px;
            left: 0;
            width: 250px;
            background: var(--dark-light);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid var(--gold);
            display: none;
            box-shadow: var(--shadow);
            z-index: 1001;
        }

        .user-dropdown.active {
            display: block;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text);
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .user-dropdown-item:hover {
            background: rgba(200, 169, 126, 0.1);
            color: var(--gold);
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-top: 80px;
            padding: 20px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* البطاقات الزجاجية */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .glass-card:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-gold);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background: rgba(200, 169, 126, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--gold);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            flex: 1;
        }

        /* فلتر البطولات */
        .leagues-filter {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        .league-chip {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .league-chip:hover,
        .league-chip.active {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .league-chip i {
            font-size: 16px;
        }

        /* شبكة المباريات */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .match-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.8));
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px;
            border: 2px solid rgba(200, 169, 126, 0.2);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .match-card::before {
            content: '⚽';
            position: absolute;
            bottom: -10px;
            left: -10px;
            font-size: 60px;
            opacity: 0.05;
            transform: rotate(-15deg);
        }

        .match-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .match-card.live {
            border-color: var(--danger);
            animation: pulse 2s infinite;
        }

        .match-card.finished {
            opacity: 0.8;
            border-color: var(--text-muted);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .match-league {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .league-icon {
            width: 30px;
            height: 30px;
            background: rgba(200, 169, 126, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--gold);
        }

        .league-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--gold);
        }

        .match-time {
            font-size: 13px;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            color: var(--text-muted);
        }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 40%;
        }

        .team-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            border: 3px solid var(--gold);
            box-shadow: var(--shadow);
        }

        .team-name {
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            color: var(--text);
        }

        .match-score {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 32px;
            font-weight: 900;
            color: var(--gold);
        }

        .score-separator {
            color: var(--text-muted);
            font-size: 24px;
        }

        .match-info {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .info-item i {
            color: var(--gold);
        }

        .prediction-badge {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid var(--football-blue);
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 12px;
            color: var(--football-blue);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .predict-btn {
            width: 100%;
            padding: 12px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 30px;
            color: var(--dark);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }

        .predict-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .predict-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .user-prediction {
            background: rgba(39, 174, 96, 0.1);
            border: 2px solid var(--success);
            border-radius: 20px;
            padding: 10px;
            margin-top: 15px;
            text-align: center;
        }

        .user-prediction .prediction-text {
            color: var(--success);
            font-weight: 700;
        }

        /* صفحة التفاصيل */
        .match-detail-page {
            display: none;
            animation: fadeIn 0.3s;
        }

        .match-detail-page.active {
            display: block;
        }

        .match-header-large {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.5));
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--gold);
        }

        .team-large {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 30%;
        }

        .team-logo-large {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 900;
            color: var(--gold);
            border: 5px solid var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .team-name-large {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
        }

        .match-score-large {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .score-box {
            font-size: 72px;
            font-weight: 900;
            color: var(--gold);
            background: rgba(0,0,0,0.3);
            padding: 20px 40px;
            border-radius: 30px;
            border: 2px solid var(--gold);
        }

        .score-separator-large {
            font-size: 48px;
            color: var(--text-muted);
        }

        .match-meta-large {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .meta-item {
            text-align: center;
            background: rgba(255,255,255,0.03);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
        }

        .meta-label {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 5px;
        }

        .meta-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }

        /* نظام التوقعات */
        .prediction-system {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .prediction-box {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 25px;
            padding: 25px;
            border: 2px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .prediction-box:hover {
            transform: translateY(-3px);
            border-color: var(--gold);
        }

        .prediction-box.selected {
            border-color: var(--success);
            background: rgba(39, 174, 96, 0.1);
        }

        .prediction-box.home {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.1), rgba(41, 128, 185, 0.1));
        }

        .prediction-box.away {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.1), rgba(192, 57, 43, 0.1));
        }

        .prediction-box.draw {
            background: linear-gradient(135deg, rgba(241, 196, 15, 0.1), rgba(243, 156, 18, 0.1));
        }

        .prediction-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .prediction-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .home .prediction-icon {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
        }

        .away .prediction-icon {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .draw .prediction-icon {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        .prediction-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
        }

        .prediction-odds {
            font-size: 24px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .prediction-stats {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 15px;
        }

        .prediction-bet {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
        }

        .bet-input {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bet-input input {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .bet-input input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .max-bet {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            text-align: center;
        }

        .potential-win {
            margin-top: 15px;
            padding: 15px;
            background: rgba(39, 174, 96, 0.1);
            border-radius: 20px;
            text-align: center;
        }

        .win-amount {
            font-size: 28px;
            font-weight: 900;
            color: var(--success);
        }

        .win-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .place-bet-btn {
            width: 100%;
            padding: 18px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 50px;
            color: var(--dark);
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 25px;
        }

        .place-bet-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-gold);
        }

        .place-bet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* توقعات المستخدمين */
        .user-predictions-list {
            max-height: 500px;
            overflow-y: auto;
            padding-left: 10px;
        }

        .user-prediction-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-right: 4px solid transparent;
        }

        .user-prediction-item.won {
            border-right-color: var(--success);
            background: rgba(39, 174, 96, 0.05);
        }

        .user-prediction-item.lost {
            border-right-color: var(--danger);
            background: rgba(231, 76, 60, 0.05);
        }

        .user-prediction-item.pending {
            border-right-color: var(--warning);
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: var(--dark);
        }

        .user-prediction-info {
            flex: 1;
        }

        .user-prediction-name {
            font-weight: 700;
            margin-bottom: 3px;
        }

        .user-prediction-detail {
            font-size: 12px;
            color: var(--text-muted);
        }

        .user-prediction-amount {
            font-weight: 700;
            color: var(--gold);
        }

        .user-prediction-result {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
        }

        .result-won {
            background: rgba(39, 174, 96, 0.2);
            color: var(--success);
        }

        .result-lost {
            background: rgba(231, 76, 60, 0.2);
            color: var(--danger);
        }

        .result-pending {
            background: rgba(243, 156, 18, 0.2);
            color: var(--warning);
        }

        /* لوحة المتصدرين */
        .leaderboard-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .leaderboard-rank {
            width: 40px;
            height: 40px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: var(--dark);
        }

        .leaderboard-rank.gold {
            background: #f1c40f;
        }

        .leaderboard-rank.silver {
            background: #bdc3c7;
        }

        .leaderboard-rank.bronze {
            background: #e67e22;
        }

        .leaderboard-info {
            flex: 1;
        }

        .leaderboard-name {
            font-weight: 700;
            margin-bottom: 3px;
        }

        .leaderboard-stats {
            font-size: 12px;
            color: var(--text-muted);
        }

        .leaderboard-winnings {
            font-weight: 700;
            color: var(--success);
        }

        /* نافذة تأكيد التوقع */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .confirm-modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .confirm-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 40px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 2px solid var(--gold);
            text-align: center;
        }

        .confirm-icon {
            width: 80px;
            height: 80px;
            background: var(--warning);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            margin: 0 auto 20px;
        }

        .confirm-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .confirm-details {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .confirm-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .confirm-detail-item:last-child {
            border-bottom: none;
        }

        .confirm-label {
            color: var(--text-muted);
        }

        .confirm-value {
            font-weight: 700;
            color: var(--gold);
        }

        .confirm-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .confirm-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .confirm-btn.cancel {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--text);
        }

        .confirm-btn.confirm {
            background: var(--gradient-gold);
            color: var(--dark);
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        /* الإشعارات */
        .toast {
            position: fixed;
            top: 100px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 16px 24px;
            border-radius: 50px;
            display: none;
            z-index: 4000;
            box-shadow: var(--shadow);
            border-right: 4px solid white;
            min-width: 300px;
            backdrop-filter: blur(10px);
            animation: slideInLeft 0.3s;
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.warning {
            background: var(--warning);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* أنيميشن */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        /* استجابة */
        @media (max-width: 1200px) {
            .matches-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 992px) {
            .prediction-system {
                grid-template-columns: 1fr;
            }
            
            .match-header-large {
                flex-direction: column;
                gap: 30px;
            }
            
            .match-score-large {
                flex-direction: column;
                gap: 20px;
            }
            
            .team-large {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .matches-grid {
                grid-template-columns: 1fr;
            }
            
            .leagues-filter {
                border-radius: 30px;
                justify-content: center;
            }
            
            .date-badge {
                display: none;
            }
            
            .page-title span {
                display: none;
            }
            
            .match-meta-large {
                gap: 15px;
            }
            
            .score-box {
                font-size: 48px;
                padding: 15px 25px;
            }
            
            .team-logo-large {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }
            
            .team-name-large {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            .main-content {
                padding: 15px;
            }
            
            .league-chip {
                padding: 8px 15px;
                font-size: 12px;
            }
            
            .toast {
                right: 10px;
                left: 10px;
                min-width: auto;
            }
            
            .confirm-content {
                padding: 25px;
            }
        }

        .glow {
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(200, 169, 126, 0.3); }
            50% { box-shadow: 0 0 40px rgba(200, 169, 126, 0.6); }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 15px;">

    <!-- قائمة المستخدم -->
    <div class="user-dropdown" id="userDropdown">
        <div class="user-dropdown-item" onclick="window.location.href='dashboard.html'">

        </div>
        <div class="user-dropdown-item" onclick="window.location.href='profile.html'">
            <i class="fas fa-user"></i>
            الملف الشخصي
        </div>
        <div class="user-dropdown-item" onclick="window.location.href='chat.html'">

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <!-- الصفحة الرئيسية للمباريات -->
        <div id="matches-page" class="matches-page active">
            <!-- فلتر البطولات -->
            <div class="leagues-filter" data-aos="fade-down">
                <span class="league-chip active" onclick="filterMatches('all')">

                </span>
                <span class="league-chip" onclick="filterMatches('champions')">

                </span>
                <span class="league-chip" onclick="filterMatches('premier')">
                    <i class="fas fa-crown"></i>
                    الدوري الإنجليزي
                </span>
                <span class="league-chip" onclick="filterMatches('laliga')">
                    <i class="fas fa-star"></i>
                    الدوري الإسباني
                </span>
                <span class="league-chip" onclick="filterMatches('seriea')">
                    <i class="fas fa-football"></i>
                    الدوري الإيطالي
                </span>
                <span class="league-chip" onclick="filterMatches('bundesliga')">
                    <i class="fas fa-shield"></i>
                    الدوري الألماني
                </span>
                <span class="league-chip" onclick="filterMatches('world')">
                    <i class="fas fa-earth"></i>
                    كأس العالم
                </span>
            </div>

            <!-- شبكة المباريات -->
            <div class="matches-grid" id="matchesGrid">
                <!-- سيتم تحميل المباريات هنا -->
                <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                    <div class="loading-spinner"></div>
                    <p style="color: var(--text-muted); margin-top: 20px;">جاري تحميل المباريات...</p>
                </div>
            </div>
        </div>

        <!-- صفحة تفاصيل المباراة -->
        <div id="match-detail-page" class="match-detail-page">
            <!-- زر العودة -->
            <div style="margin-bottom: 20px;">
                <button class="back-btn" onclick="showMatchesPage()" style="width: auto; padding: 10px 20px;">
                    <i class="fas fa-arrow-right"></i>
                    العودة للمباريات
                </button>
            </div>

            <!-- رأس المباراة -->
            <div class="match-header-large" id="matchHeader"></div>

            <!-- نظام التوقعات -->
            <div class="prediction-system" id="predictionSystem"></div>

            <!-- توقعات المستخدمين والمتصدرين -->
            <div class="glass-card">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <h2 class="card-title">توقعات المستخدمين</h2>
                </div>
                <div class="user-predictions-list" id="userPredictionsList">
                    <p style="color: var(--text-muted); text-align: center;">لا توجد توقعات بعد</p>
                </div>
            </div>

            <!-- لوحة المتصدرين -->
            <div class="glass-card">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-crown"></i>
                    </div>
                    <h2 class="card-title">المتصدرين</h2>
                </div>
                <div class="leaderboard-list" id="leaderboardList">
                    <p style="color: var(--text-muted); text-align: center;">جاري التحميل...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة تأكيد التوقع -->
    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-content">
            <div class="confirm-icon">
                <i class="fas fa-futbol"></i>
            </div>
            <h3 class="confirm-title">تأكيد التوقع</h3>
            <div class="confirm-details" id="confirmDetails"></div>
            <div class="confirm-actions">
                <button class="confirm-btn cancel" onclick="closeConfirmModal()">إلغاء</button>
                <button class="confirm-btn confirm" onclick="submitPrediction()">تأكيد التوقع</button>
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="toast" id="toast"></div>

    <!-- AOS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script>
        AOS.init({
            duration: 800,
            once: true
        });

        // متغيرات عامة
        let currentUser = null;
        let currentMatch = null;
        let selectedPrediction = null;
        let betAmount = 10;
        let matches = [];
        let userPredictions = [];

        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', async function() {
            await checkUser();
            await loadMatches();
            await loadLeaderboard();
            updateDateTime();
            setInterval(updateDateTime, 1000);
        });

        // تحديث الوقت
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = now.toLocaleString('ar-SA', {
                hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short'
            });
        }

        // التحقق من المستخدم
        async function checkUser() {
            const savedUser = localStorage.getItem('current_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
            
            if (window.supabaseHelpers) {
                const result = await window.supabaseHelpers.getUserById(currentUser.id);
                if (result.success && result.data) {
                    currentUser = result.data;
                    localStorage.setItem('current_user', JSON.stringify(currentUser));
                }
            }
            
            document.getElementById('userAvatar').textContent = currentUser.name?.charAt(0).toUpperCase() || 'م';
        }

        // تحميل المباريات
        async function loadMatches() {
            try {
                const { data, error } = await supabaseClient
                    .from('football_matches')
                    .select('*')
                    .order('match_time', { ascending: true });

                if (error) throw error;

                if (data && data.length > 0) {
                    matches = data;
                } else {
                    // بيانات افتراضية إذا لم توجد مباريات في قاعدة البيانات
                    matches = getDefaultMatches();
                }

                displayMatches(matches);
            } catch (error) {
                console.error('خطأ في تحميل المباريات:', error);
                matches = getDefaultMatches();
                displayMatches(matches);
            }
        }

        // مباريات افتراضية
        function getDefaultMatches() {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            const nextWeek = new Date(now);
            nextWeek.setDate(nextWeek.getDate() + 7);

            return [
                {
                    id: 1,
                    home_team: 'ريال مدريد',
                    away_team: 'برشلونة',
                    home_logo: 'RM',
                    away_logo: 'BR',
                    league: 'champions',
                    league_name: 'دوري أبطال أوروبا',
                    match_time: tomorrow.toISOString(),
                    status: 'upcoming',
                    home_odds: 2.10,
                    draw_odds: 3.40,
                    away_odds: 3.20
                },
                {
                    id: 2,
                    home_team: 'مانشستر سيتي',
                    away_team: 'ليفربول',
                    home_logo: 'MC',
                    away_logo: 'LV',
                    league: 'premier',
                    league_name: 'الدوري الإنجليزي',
                    match_time: nextWeek.toISOString(),
                    status: 'upcoming',
                    home_odds: 1.95,
                    draw_odds: 3.50,
                    away_odds: 3.60
                },
                {
                    id: 3,
                    home_team: 'باريس سان جيرمان',
                    away_team: 'بايرن ميونخ',
                    home_logo: 'PS',
                    away_logo: 'BM',
                    league: 'champions',
                    league_name: 'دوري أبطال أوروبا',
                    match_time: new Date(now.setHours(20, 45)).toISOString(),
                    status: 'live',
                    home_score: 1,
                    away_score: 0,
                    home_odds: 2.30,
                    draw_odds: 3.60,
                    away_odds: 2.80
                },
                {
                    id: 4,
                    home_team: 'إنتر ميلان',
                    away_team: 'ميلان',
                    home_logo: 'IN',
                    away_logo: 'ML',
                    league: 'seriea',
                    league_name: 'الدوري الإيطالي',
                    match_time: new Date(now.setDate(now.getDate() - 1)).toISOString(),
                    status: 'finished',
                    home_score: 2,
                    away_score: 1,
                    home_odds: 2.20,
                    draw_odds: 3.30,
                    away_odds: 3.10
                },
                {
                    id: 5,
                    home_team: 'بروسيا دورتموند',
                    away_team: 'باير ليفركوزن',
                    home_logo: 'BD',
                    away_logo: 'BL',
                    league: 'bundesliga',
                    league_name: 'الدوري الألماني',
                    match_time: new Date(now.setDate(now.getDate() + 3)).toISOString(),
                    status: 'upcoming',
                    home_odds: 2.40,
                    draw_odds: 3.70,
                    away_odds: 2.60
                },
                {
                    id: 6,
                    home_team: 'أتلتيكو مدريد',
                    away_team: 'ريال سوسيداد',
                    home_logo: 'AM',
                    away_logo: 'RS',
                    league: 'laliga',
                    league_name: 'الدوري الإسباني',
                    match_time: new Date(now.setDate(now.getDate() + 2)).toISOString(),
                    status: 'upcoming',
                    home_odds: 1.85,
                    draw_odds: 3.45,
                    away_odds: 4.20
                }
            ];
        }

        // عرض المباريات
        function displayMatches(matchesToShow) {
            const grid = document.getElementById('matchesGrid');
            
            if (!matchesToShow || matchesToShow.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;"><p style="color: var(--text-muted);">لا توجد مباريات حالياً</p></div>';
                return;
            }

            let html = '';
            matchesToShow.forEach(match => {
                const matchTime = new Date(match.match_time);
                const now = new Date();
                const isLive = match.status === 'live';
                const isFinished = match.status === 'finished';
                
                let timeText = '';
                if (isLive) {
                    timeText = '<span style="color: var(--danger);"><i class="fas fa-circle"></i> مباشر</span>';
                } else if (isFinished) {
                    timeText = 'انتهت';
                } else {
                    timeText = matchTime.toLocaleDateString('ar-SA', { 
                        hour: '2-digit', 
                        minute: '2-digit',
                        day: 'numeric',
                        month: 'short'
                    });
                }

                let scoreDisplay = '';
                if (match.home_score !== undefined && match.away_score !== undefined) {
                    scoreDisplay = `
                        <div class="match-score">
                            <span>${match.home_score}</span>
                            <span class="score-separator">-</span>
                            <span>${match.away_score}</span>
                        </div>
                    `;
                } else {
                    scoreDisplay = `
                        <div class="match-score">
                            <span>-</span>
                            <span class="score-separator">:</span>
                            <span>-</span>
                        </div>
                    `;
                }

                html += `
                    <div class="match-card ${isLive ? 'live' : ''} ${isFinished ? 'finished' : ''}" onclick="openMatchDetail(${match.id})">
                        <div class="match-header">
                            <div class="match-league">
                                <div class="league-icon">
                                    <i class="fas ${getLeagueIcon(match.league)}"></i>
                                </div>
                                <span class="league-name">${match.league_name || match.league}</span>
                            </div>
                            <span class="match-time">${timeText}</span>
                        </div>
                        
                        <div class="match-teams">
                            <div class="team">
                                <div class="team-logo">${match.home_logo || match.home_team.substring(0, 2).toUpperCase()}</div>
                                <span class="team-name">${match.home_team}</span>
                            </div>
                            
                            ${scoreDisplay}
                            
                            <div class="team">
                                <div class="team-logo">${match.away_logo || match.away_team.substring(0, 2).toUpperCase()}</div>
                                <span class="team-name">${match.away_team}</span>
                            </div>
                        </div>
                        
                        <div class="match-info">
                            <div class="info-item">
                                <i class="fas fa-chart-line"></i>
                                <span>${match.home_odds} - ${match.away_odds}</span>
                            </div>
                            <div class="info-item">
                                <i class="fas fa-users"></i>
                                <span>${Math.floor(Math.random() * 50) + 10} توقع</span>
                            </div>
                        </div>
                        
                        ${!isFinished ? `
                            <button class="predict-btn" onclick="event.stopPropagation(); openMatchDetail(${match.id})">
                                <i class="fas fa-bolt"></i>
                                توقع الآن
                            </button>
                        ` : ''}
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // الحصول على أيقونة البطولة
        function getLeagueIcon(league) {
            const icons = {
                'champions': 'fa-trophy',
                'premier': 'fa-crown',
                'laliga': 'fa-star',
                'seriea': 'fa-football',
                'bundesliga': 'fa-shield',
                'world': 'fa-earth'
            };
            return icons[league] || 'fa-futbol';
        }

        // فلترة المباريات
        function filterMatches(league) {
            document.querySelectorAll('.league-chip').forEach(chip => chip.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (league === 'all') {
                displayMatches(matches);
            } else {
                const filtered = matches.filter(m => m.league === league);
                displayMatches(filtered);
            }
        }

        // فتح تفاصيل المباراة
        async function openMatchDetail(matchId) {
            const match = matches.find(m => m.id === matchId);
            if (!match) return;
            
            currentMatch = match;
            
            document.getElementById('matches-page').classList.remove('active');
            document.getElementById('match-detail-page').classList.add('active');
            
            displayMatchHeader();
            displayPredictionSystem();
            await loadMatchPredictions(matchId);
        }

        // عرض رأس المباراة
        function displayMatchHeader() {
            if (!currentMatch) return;
            
            const match = currentMatch;
            const matchTime = new Date(match.match_time);
            const isLive = match.status === 'live';
            const isFinished = match.status === 'finished';
            
            let scoreDisplay = '';
            if (match.home_score !== undefined && match.away_score !== undefined) {
                scoreDisplay = `
                    <div class="score-box">${match.home_score}</div>
                    <span class="score-separator-large">-</span>
                    <div class="score-box">${match.away_score}</div>
                `;
            } else {
                scoreDisplay = `
                    <div class="score-box">?</div>
                    <span class="score-separator-large">:</span>
                    <div class="score-box">?</div>
                `;
            }

            const html = `
                <div class="team-large">
                    <div class="team-logo-large">${match.home_logo || match.home_team.substring(0, 2).toUpperCase()}</div>
                    <div class="team-name-large">${match.home_team}</div>
                </div>
                
                <div class="match-score-large">
                    ${scoreDisplay}
                </div>
                
                <div class="team-large">
                    <div class="team-logo-large">${match.away_logo || match.away_team.substring(0, 2).toUpperCase()}</div>
                    <div class="team-name-large">${match.away_team}</div>
                </div>
            `;

            document.getElementById('matchHeader').innerHTML = html;

            const metaHtml = `
                <div class="match-meta-large">
                    <div class="meta-item">
                        <div class="meta-label">البطولة</div>
                        <div class="meta-value">${match.league_name || match.league}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">التاريخ</div>
                        <div class="meta-value">${matchTime.toLocaleDateString('ar-SA')}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">الوقت</div>
                        <div class="meta-value">${matchTime.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">الحالة</div>
                        <div class="meta-value" style="color: ${isLive ? '#e74c3c' : isFinished ? '#95a5a6' : '#27ae60'}">
                            ${isLive ? 'مباشر' : isFinished ? 'انتهت' : 'قادمة'}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('matchHeader').insertAdjacentHTML('afterend', metaHtml);
        }

        // عرض نظام التوقعات
        function displayPredictionSystem() {
            if (!currentMatch || currentMatch.status === 'finished') {
                document.getElementById('predictionSystem').innerHTML = `
                    <div class="glass-card" style="text-align: center;">
                        <i class="fas fa-clock" style="font-size: 48px; color: var(--text-muted); margin-bottom: 15px;"></i>
                        <h3 style="color: var(--gold);">انتهت المباراة</h3>
                        <p style="color: var(--text-muted);">لا يمكن التوقع على مباراة منتهية</p>
                    </div>
                `;
                return;
            }

            const match = currentMatch;
            
            const html = `
                <div class="prediction-box home ${selectedPrediction === 'home' ? 'selected' : ''}" onclick="selectPrediction('home')">
                    <div class="prediction-header">
                        <div class="prediction-icon">
                            <i class="fas fa-shield"></i>
                        </div>
                        <div class="prediction-title">فوز ${match.home_team}</div>
                    </div>
                    <div class="prediction-odds">${match.home_odds}</div>
                    <div class="prediction-stats">
                        <span>احتمالية: ${Math.round((1 / match.home_odds) * 100)}%</span>
                        <span>${Math.floor(Math.random() * 100) + 50} توقع</span>
                    </div>
                </div>

                <div class="prediction-box draw ${selectedPrediction === 'draw' ? 'selected' : ''}" onclick="selectPrediction('draw')">
                    <div class="prediction-header">
                        <div class="prediction-icon">
                            <i class="fas fa-handshake"></i>
                        </div>
                        <div class="prediction-title">تعادل</div>
                    </div>
                    <div class="prediction-odds">${match.draw_odds}</div>
                    <div class="prediction-stats">
                        <span>احتمالية: ${Math.round((1 / match.draw_odds) * 100)}%</span>
                        <span>${Math.floor(Math.random() * 50) + 20} توقع</span>
                    </div>
                </div>

                <div class="prediction-box away ${selectedPrediction === 'away' ? 'selected' : ''}" onclick="selectPrediction('away')">
                    <div class="prediction-header">
                        <div class="prediction-icon">
                            <i class="fas fa-flag"></i>
                        </div>
                        <div class="prediction-title">فوز ${match.away_team}</div>
                    </div>
                    <div class="prediction-odds">${match.away_odds}</div>
                    <div class="prediction-stats">
                        <span>احتمالية: ${Math.round((1 / match.away_odds) * 100)}%</span>
                        <span>${Math.floor(Math.random() * 80) + 30} توقع</span>
                    </div>
                </div>

                <div class="prediction-box" style="grid-column: 1/-1;">
                    <div class="prediction-bet">
                        <h4 style="color: var(--gold); margin-bottom: 15px;">💰 مبلغ التوقع</h4>
                        <div class="bet-input">
                            <input type="number" id="betAmount" min="1" max="${currentUser?.balance || 0}" value="10" step="5" onchange="updatePotentialWin()" onkeyup="updatePotentialWin()">
                        </div>
                        <div class="max-bet">الحد الأقصى: ${currentUser?.balance || 0}$</div>
                        
                        <div class="potential-win" id="potentialWinBox">
                            <div class="win-label">الأرباح المتوقعة</div>
                            <div class="win-amount" id="potentialWin">0$</div>
                            <small style="color: var(--text-muted);">(شامل المبلغ)</small>
                        </div>
                    </div>
                    
                    <button class="place-bet-btn" onclick="openConfirmModal()" ${!selectedPrediction ? 'disabled' : ''}>
                        <i class="fas fa-check-circle"></i>
                        تأكيد التوقع
                    </button>
                </div>
            `;

            document.getElementById('predictionSystem').innerHTML = html;
            
            // تحديث الأرباح المتوقعة
            setTimeout(updatePotentialWin, 100);
        }

        // اختيار التوقع
        function selectPrediction(type) {
            selectedPrediction = type;
            displayPredictionSystem();
        }

        // تحديث الأرباح المتوقعة
        function updatePotentialWin() {
            const amount = parseFloat(document.getElementById('betAmount')?.value) || 10;
            betAmount = amount;
            
            if (!selectedPrediction || !currentMatch) return;
            
            let odds = 1;
            if (selectedPrediction === 'home') odds = currentMatch.home_odds;
            else if (selectedPrediction === 'draw') odds = currentMatch.draw_odds;
            else if (selectedPrediction === 'away') odds = currentMatch.away_odds;
            
            const winAmount = amount * odds;
            document.getElementById('potentialWin').textContent = winAmount.toFixed(2) + '$';
        }

        // فتح نافذة التأكيد
        function openConfirmModal() {
            if (!currentUser) {
                showToast('❌ يجب تسجيل الدخول أولاً', 'error');
                return;
            }
            
            if (currentUser.balance < betAmount) {
                showToast('❌ الرصيد غير كافي', 'error');
                return;
            }
            
            if (!selectedPrediction || !currentMatch) return;
            
            let predictionText = '';
            let odds = 1;
            
            if (selectedPrediction === 'home') {
                predictionText = `فوز ${currentMatch.home_team}`;
                odds = currentMatch.home_odds;
            } else if (selectedPrediction === 'draw') {
                predictionText = 'تعادل';
                odds = currentMatch.draw_odds;
            } else if (selectedPrediction === 'away') {
                predictionText = `فوز ${currentMatch.away_team}`;
                odds = currentMatch.away_odds;
            }
            
            const winAmount = betAmount * odds;
            
            const details = `
                <div class="confirm-detail-item">
                    <span class="confirm-label">المباراة:</span>
                    <span class="confirm-value">${currentMatch.home_team} vs ${currentMatch.away_team}</span>
                </div>
                <div class="confirm-detail-item">
                    <span class="confirm-label">توقعك:</span>
                    <span class="confirm-value">${predictionText}</span>
                </div>
                <div class="confirm-detail-item">
                    <span class="confirm-label">نسبة الربح:</span>
                    <span class="confirm-value">${odds}</span>
                </div>
                <div class="confirm-detail-item">
                    <span class="confirm-label">المبلغ:</span>
                    <span class="confirm-value">${betAmount}$</span>
                </div>
                <div class="confirm-detail-item">
                    <span class="confirm-label">الأرباح المتوقعة:</span>
                    <span class="confirm-value" style="color: var(--success);">${winAmount.toFixed(2)}$</span>
                </div>
            `;
            
            document.getElementById('confirmDetails').innerHTML = details;
            document.getElementById('confirmModal').classList.add('active');
        }

        // إغلاق نافذة التأكيد
        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        // تقديم التوقع
        async function submitPrediction() {
            if (!currentUser || !currentMatch || !selectedPrediction) return;
            
            try {
                // خصم المبلغ من رصيد المستخدم
                const newBalance = currentUser.balance - betAmount;
                
                await supabaseClient
                    .from('users')
                    .update({ balance: newBalance })
                    .eq('id', currentUser.id);
                
                // تسجيل التوقع
                const { data, error } = await supabaseClient
                    .from('match_predictions')
                    .insert([{
                        match_id: currentMatch.id,
                        user_id: currentUser.id,
                        user_name: currentUser.name,
                        prediction: selectedPrediction,
                        amount: betAmount,
                        odds: selectedPrediction === 'home' ? currentMatch.home_odds :
                              selectedPrediction === 'draw' ? currentMatch.draw_odds :
                              currentMatch.away_odds,
                        potential_win: betAmount * (selectedPrediction === 'home' ? currentMatch.home_odds :
                                                   selectedPrediction === 'draw' ? currentMatch.draw_odds :
                                                   currentMatch.away_odds),
                        status: 'pending',
                        created_at: new Date().toISOString()
                    }])
                    .select();
                
                if (error) throw error;
                
                // تحديث بيانات المستخدم
                currentUser.balance = newBalance;
                localStorage.setItem('current_user', JSON.stringify(currentUser));
                
                showToast('✅ تم تقديم توقعك بنجاح! بالتوفيق', 'success');
                closeConfirmModal();
                
                // إعادة تحميل التوقعات
                await loadMatchPredictions(currentMatch.id);
                await loadLeaderboard();
                
                // إعادة تعيين الاختيار
                selectedPrediction = null;
                displayPredictionSystem();
                
            } catch (error) {
                console.error('خطأ في تقديم التوقع:', error);
                showToast('❌ ' + error.message, 'error');
            }
        }

        // تحميل توقعات المباراة
        async function loadMatchPredictions(matchId) {
            try {
                const { data, error } = await supabaseClient
                    .from('match_predictions')
                    .select('*')
                    .eq('match_id', matchId)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                userPredictions = data || [];
                displayMatchPredictions();
            } catch (error) {
                console.error('خطأ في تحميل التوقعات:', error);
                userPredictions = [];
                displayMatchPredictions();
            }
        }

        // عرض توقعات المباراة
        function displayMatchPredictions() {
            const list = document.getElementById('userPredictionsList');
            
            if (!userPredictions || userPredictions.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); text-align: center;">لا توجد توقعات بعد</p>';
                return;
            }

            let html = '';
            userPredictions.slice(0, 20).forEach(pred => {
                let predictionText = '';
                if (pred.prediction === 'home') predictionText = 'فوز صاحب الأرض';
                else if (pred.prediction === 'draw') predictionText = 'تعادل';
                else if (pred.prediction === 'away') predictionText = 'فوز الضيف';

                let resultClass = 'pending';
                let resultText = 'قيد الانتظار';

                if (pred.status === 'won') {
                    resultClass = 'won';
                    resultText = 'فائز';
                } else if (pred.status === 'lost') {
                    resultClass = 'lost';
                    resultText = 'خاسر';
                }

                html += `
                    <div class="user-prediction-item ${resultClass}">
                        <div class="user-avatar-small">${pred.user_name?.charAt(0).toUpperCase() || 'م'}</div>
                        <div class="user-prediction-info">
                            <div class="user-prediction-name">${pred.user_name || 'مستخدم'}</div>
                            <div class="user-prediction-detail">
                                ${predictionText} • ${pred.amount}$ • نسبة ${pred.odds}
                            </div>
                        </div>
                        <div>
                            <div class="user-prediction-amount">${pred.potential_win?.toFixed(2) || 0}$</div>
                            <span class="user-prediction-result result-${pred.status || 'pending'}">${resultText}</span>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        // تحميل لوحة المتصدرين
        async function loadLeaderboard() {
            try {
                const { data, error } = await supabaseClient
                    .from('match_predictions')
                    .select('user_id, user_name, amount, potential_win, status')
                    .eq('status', 'won')
                    .order('potential_win', { ascending: false })
                    .limit(50);

                if (error) throw error;

                // تجميع النتائج حسب المستخدم
                const leaderboard = {};
                (data || []).forEach(pred => {
                    if (!leaderboard[pred.user_id]) {
                        leaderboard[pred.user_id] = {
                            name: pred.user_name,
                            total_won: 0,
                            count: 0
                        };
                    }
                    leaderboard[pred.user_id].total_won += pred.potential_win;
                    leaderboard[pred.user_id].count += 1;
                });

                const sorted = Object.values(leaderboard)
                    .sort((a, b) => b.total_won - a.total_won)
                    .slice(0, 20);

                displayLeaderboard(sorted);
            } catch (error) {
                console.error('خطأ في تحميل المتصدرين:', error);
                displayLeaderboard([]);
            }
        }

        // عرض لوحة المتصدرين
        function displayLeaderboard(leaders) {
            const list = document.getElementById('leaderboardList');
            
            if (!leaders || leaders.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); text-align: center;">لا يوجد متصدرين بعد</p>';
                return;
            }

            let html = '';
            leaders.forEach((leader, index) => {
                let rankClass = '';
                if (index === 0) rankClass = 'gold';
                else if (index === 1) rankClass = 'silver';
                else if (index === 2) rankClass = 'bronze';

                html += `
                    <div class="leaderboard-item">
                        <div class="leaderboard-rank ${rankClass}">${index + 1}</div>
                        <div class="leaderboard-info">
                            <div class="leaderboard-name">${leader.name}</div>
                            <div class="leaderboard-stats">${leader.count} توقع ناجح</div>
                        </div>
                        <div class="leaderboard-winnings">${leader.total_won.toFixed(2)}$</div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        // العودة لصفحة المباريات
        function showMatchesPage() {
            document.getElementById('matches-page').classList.add('active');
            document.getElementById('match-detail-page').classList.remove('active');
            currentMatch = null;
            selectedPrediction = null;
        }

        // تبديل قائمة المستخدم
        function toggleUserMenu() {
            document.getElementById('userDropdown').classList.toggle('active');
        }

        // تسجيل الخروج
        function logout() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                localStorage.removeItem('current_user');
                window.location.href = 'index.html';
            }
        }

        // إظهار الإشعار
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('userDropdown');
            const avatar = document.getElementById('userAvatar');
            if (dropdown && avatar && !avatar.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        });

        // تحديث عند العودة للصفحة
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });
    </script>
</body>
</html>
